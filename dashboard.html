<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - العَبَرات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
.bg-navy { background-color: #0B2545; }.bg-gold { background-color: #F5B301; }
.card { transition: all 0.3s; }.card:hover { transform: translateY(-5px); }
  </style>
</head>
<body class="bg-gray-100">
  <div class="bg-navy text-white p-4">
    <div class="container mx-auto flex justify-between items-center">
      <h1 id="storeName" class="text-2xl font-black">لوحة التحكم</h1>
      <div class="flex gap-4">
        <a href="pos.html" class="bg-gold text-navy px-4 py-2 rounded font-bold">الكاشير</a>
        <a href="products.html" class="bg-blue-600 text-white px-4 py-2 rounded font-bold">المنتجات</a>
        <a href="reports.html" class="bg-white/20 px-4 py-2 rounded">التقارير</a>
        <a href="customers.html" class="bg-white/20 px-4 py-2 rounded">العملاء</a>
      </div>
    </div>
  </div>

  <div class="container mx-auto p-6">
    <!-- تنبيهات مهمة -->
    <div id="alertsSection" class="mb-6"></div>

    <!-- كروت الإحصائيات -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
      <div class="card bg-white p-6 rounded-lg shadow">
        <div class="text-gray-500 text-sm">مبيعات اليوم</div>
        <div id="todaySales" class="text-3xl font-black text-navy mt-2">0.00 ر.س</div>
        <div id="todayCount" class="text-xs text-gray-400 mt-1">0 فاتورة</div>
      </div>
      <div class="card bg-white p-6 rounded-lg shadow">
        <div class="text-gray-500 text-sm">ربح اليوم</div>
        <div id="todayProfit" class="text-3xl font-black text-green-600 mt-2">0.00 ر.س</div>
        <div class="text-xs text-gray-400 mt-1">بعد خصم التكلفة</div>
      </div>
      <div class="card bg-white p-6 rounded-lg shadow">
        <div class="text-gray-500 text-sm">عدد المنتجات</div>
        <div id="productsCount" class="text-3xl font-black text-blue-600 mt-2">0</div>
        <div id="lowStockCount" class="text-xs text-red-500 mt-1">0 منتج منخفض</div>
      </div>
      <div class="card bg-white p-6 rounded-lg shadow">
        <div class="text-gray-500 text-sm">ديون العملاء</div>
        <div id="totalDebt" class="text-3xl font-black text-purple-600 mt-2">0.00 ر.س</div>
        <div id="debtCount" class="text-xs text-gray-400 mt-1">0 عميل</div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- المنتجات المنتهية/قربت تنتهي -->
      <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-xl font-bold text-navy mb-4">⚠️ تنبيهات تاريخ الانتهاء</h3>
        <div id="expiryList" class="space-y-2 max-h-80 overflow-y-auto"></div>
      </div>

      <!-- أكثر منتج مبيعاً -->
      <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-xl font-bold text-navy mb-4">🔥 الأكثر مبيعاً اليوم</h3>
        <div id="topProducts" class="space-y-2"></div>
      </div>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  const supabase = createClient('https://eeiegignudoedrlkuaqn.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlaWVnaWdudWRvZWRybGt1YXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODUwNzMsImV4cCI6MjA5MzA2MTA3M30.gtqh1KbGmXZ9VBkmpFCYtJetn1ZXPHcp5oX9sENBb2Q')

  let currentStore = null;

  async function init() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { window.location.href = 'alabarat.html'; return; }
    const { data: store } = await supabase.from('stores').select().eq('user_id', user.id).single();
    currentStore = store;
    document.getElementById('storeName').textContent = 'لوحة تحكم: ' + store.store_name;

    await Promise.all([
      loadTodayStats(),
      loadProductsAlerts(),
      loadTopProducts(),
      loadCustomersDebt()
    ]);
  }

  async function loadTodayStats() {
    const today = new Date();
    today.setHours(0,0,0,0);
    const { data: sales } = await supabase.from('sales')
     .select('total_amount, id')
     .eq('store_id', currentStore.id)
     .gte('created_at', today.toISOString());

    const totalSales = sales?.reduce((sum, s) => sum + Number(s.total_amount), 0) || 0;
    document.getElementById('todaySales').textContent = totalSales.toFixed(2) + ' ر.س';
    document.getElementById('todayCount').textContent = (sales?.length || 0) + ' فاتورة';

    // حساب الربح
    if(sales?.length > 0) {
      const saleIds = sales.map(s => s.id);
      const { data: items } = await supabase.from('sale_items')
       .select('qty, unit_price, cost_price')
       .in('sale_id', saleIds);
      const profit = items?.reduce((sum, i) => {
        return sum + (Number(i.unit_price) - Number(i.cost_price)) * Number(i.qty) / 1.15;
      }, 0) || 0;
      document.getElementById('todayProfit').textContent = profit.toFixed(2) + ' ر.س';
    }
  }

  async function loadProductsAlerts() {
    const { data: products } = await supabase.from('products')
     .select()
     .eq('store_id', currentStore.id);

    document.getElementById('productsCount').textContent = products?.length || 0;

    const lowStock = products?.filter(p => Number(p.stock_qty) <= 5) || [];
    document.getElementById('lowStockCount').textContent = lowStock.length + ' منتج منخفض';

    // تنبيهات تاريخ الانتهاء
    const today = new Date();
    const tenDaysLater = new Date();
    tenDaysLater.setDate(today.getDate() + 10);

    const expired = [];
    const nearExpiry = [];

    products?.forEach(p => {
      if(p.expiry_date) {
        const expDate = new Date(p.expiry_date);
        if(expDate < today) {
          expired.push(p);
        } else if(expDate <= tenDaysLater) {
          const daysLeft = Math.ceil((expDate - today) / (1000*60*60*24));
          nearExpiry.push({...p, daysLeft});
        }
      }
    });

    // عرض التنبيهات فوق
    const alertsDiv = document.getElementById('alertsSection');
    if(expired.length > 0 || nearExpiry.length > 0) {
      let alertHTML = '<div class="space-y-2">';
      if(expired.length > 0) {
        alertHTML += `<div class="bg-red-100 border-r-4 border-red-600 p-4 rounded">
          <div class="font-bold text-red-800">⛔ منتجات منتهية: ${expired.length}</div>
          <div class="text-sm text-red-700">${expired.slice(0,3).map(p => p.name).join('، ')}</div>
        </div>`;
      }
      if(nearExpiry.length > 0) {
        alertHTML += `<div class="bg-yellow-100 border-r-4 border-yellow-600 p-4 rounded">
          <div class="font-bold text-yellow-800">⚠️ منتجات قربت تنتهي: ${nearExpiry.length}</div>
          <div class="text-sm text-yellow-700">${nearExpiry.slice(0,3).map(p => p.name + ' (' + p.daysLeft + ' يوم)').join('، ')}</div>
        </div>`;
      }
      alertHTML += '</div>';
      alertsDiv.innerHTML = alertHTML;
    }

    // قائمة التفاصيل
    const expiryList = document.getElementById('expiryList');
    if(expired.length === 0 && nearExpiry.length === 0) {
      expiryList.innerHTML = '<p class="text-green-600 text-center py-4">✅ كل المنتجات سليمة</p>';
    } else {
      expiryList.innerHTML = [...expired.map(p =>
        `<div class="flex justify-between p-3 bg-red-50 rounded border-r-4 border-red-600">
          <span class="font-bold">${p.name}</span>
          <span class="text-red-600 text-sm">منتهي ${p.expiry_date}</span>
        </div>`
      ),...nearExpiry.map(p =>
        `<div class="flex justify-between p-3 bg-yellow-50 rounded border-r-4 border-yellow-600">
          <span class="font-bold">${p.name}</span>
          <span class="text-yellow-700 text-sm">باقي ${p.daysLeft} يوم</span>
        </div>`
      )].join('');
    }
  }

  async function loadTopProducts() {
    const today = new Date();
    today.setHours(0,0,0,0);
    const { data: sales } = await supabase.from('sales').select('id').eq('store_id', currentStore.id).gte('created_at', today.toISOString());

    if(!sales?.length) {
      document.getElementById('topProducts').innerHTML = '<p class="text-gray-400 text-center py-4">لا توجد مبيعات اليوم</p>';
      return;
    }

    const { data: items } = await supabase.from('sale_items')
     .select('product_id, qty, products(name)')
     .in('sale_id', sales.map(s => s.id));

    const productSales = {};
    items?.forEach(i => {
      const name = i.products?.name || 'غير معروف';
      productSales[name] = (productSales[name] || 0) + Number(i.qty);
    });

    const sorted = Object.entries(productSales).sort((a,b) => b[1] - a[1]).slice(0,5);
    document.getElementById('topProducts').innerHTML = sorted.map(([name, qty], idx) =>
      `<div class="flex justify-between p-3 bg-gray-50 rounded">
        <span><span class="font-bold text-gold">#${idx+1}</span> ${name}</span>
        <span class="font-bold">${qty} قطعة</span>
      </div>`
    ).join('');
  }

  async function loadCustomersDebt() {
    const { data: customers } = await supabase.from('customers')
     .select('balance')
     .eq('store_id', currentStore.id)
     .lt('balance', 0);

    const totalDebt = customers?.reduce((sum, c) => sum + Math.abs(Number(c.balance)), 0) || 0;
    document.getElementById('totalDebt').textContent = totalDebt.toFixed(2) + ' ر.س';
    document.getElementById('debtCount').textContent = (customers?.length || 0) + ' عميل';
  }

  init();
</script>
</body>
</html>
