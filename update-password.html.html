<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تغيير كلمة السر - العَبَرات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>body { font-family: 'Cairo', sans-serif; } .bg-navy { background-color: #0B2545; }</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
    <h1 class="text-2xl font-black text-navy mb-6 text-center">كلمة سر جديدة</h1>
    <input id="newPassword" type="password" placeholder="كلمة السر الجديدة" class="w-full p-3 mb-4 border-2 rounded-lg">
    <input id="confirmPassword" type="password" placeholder="تأكيد كلمة السر" class="w-full p-3 mb-4 border-2 rounded-lg">
    <button onclick="updatePassword()" class="w-full bg-navy text-white p-3 rounded-lg font-bold">تحديث</button>
    <div class="empty-section">
        <!-- قسم تم تعبئته -->
        <p>لا توجد بيانات لعرضها حالياً</p>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  const supabase = createClient('https://eeiegignudoedrlkuaqn.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlaWVnaWdudWRvZWRybGt1YXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODUwNzMsImV4cCI6MjA5MzA2MTA3M30.gtqh1KbGmXZ9VBkmpFCYtJetn1ZXPHcp5oX9sENBb2Q')

  window.updatePassword = async function() {
    const newPass = document.getElementById('newPassword').value;
    const confirmPass = document.getElementById('confirmPassword').value;
    const msg = document.getElementById('msg');
    
    if (newPass.length < 6) return msg.textContent = 'كلمة السر قصيرة';
    if (newPass !== confirmPass) return msg.textContent = 'كلمة السر غير متطابقة';
    
    const { error } = await supabase.auth.updateUser({ password: newPass });
    if (error) msg.textContent = 'خطأ: ' + error.message;
    else {
      msg.textContent = 'تم التحديث بنجاح ✅';
      msg.className = 'text-center mt-4 text-sm font-bold text-green-600';
      setTimeout(() => window.location.href = 'login.html', 1500);
    }
  }
</script>
</body>
</html>
