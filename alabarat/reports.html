<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التقارير - العَبَرات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
    .bg-navy { background-color: #0B2545; }.bg-gold { background-color: #F5B301; }
  </style>
</head>
<body class="bg-gray-100">
  <header class="bg-navy text-white shadow-lg sticky top-0 z-40">
    <div class="container mx-auto px-4 py-3">
      <div class="flex flex-wrap justify-between items-center gap-3">
        <div class="flex items-center gap-3">
          <div class="text-2xl font-black text-gold">العَبَرات</div>
          <div id="storeNameHeader" class="text-sm text-gray-300"></div>
        </div>
        <div class="flex flex-wrap gap-2">
          <a href="dashboard.html" class="bg-gold text-navy px-3 py-2 rounded-lg font-bold hover:bg-yellow-500">📦 المنتجات</a>
          <a href="pos.html" class="bg-green-600 px-3 py-2 rounded-lg font-bold hover:bg-green-700">💰 الكاشير</a>
          <a href="customers.html" class="bg-blue-600 px-3 py-2 rounded-lg font-bold hover:bg-blue-700">👥 العملاء</a>
          <a href="suppliers.html" class="bg-purple-600 px-3 py-2 rounded-lg font-bold hover:bg-purple-700">🏭 الموردين</a>
          <a href="purchases.html" class="bg-orange-600 px-3 py-2 rounded-lg font-bold hover:bg-orange-700">🛒 المشتريات</a>
          <a href="reports.html" class="bg-white text-navy px-3 py-2 rounded-lg font-bold">📊 التقارير</a>
        </div>
        <button onclick="supabase.auth.signOut().then(()=>window.location.href='alabarat.html')" class="bg-red-600 px-3 py-2 rounded-lg font-bold hover:bg-red-700">🚪 خروج</button>
      </div>
    </div>
  </header>

  <div class="container mx-auto p-4 max-w-7xl">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-black text-navy">لوحة التقارير</h1>
      <select id="dateFilter" onchange="loadReports()" class="p-2 border rounded-lg">
        <option value="today">اليوم</option>
        <option value="week">آخر 7 أيام</option>
        <option value="month">هذا الشهر</option>
        <option value="all">كل الوقت</option>
      </select>
    </div>

    <!-- كروت الأرقام -->
    <div class="grid md:grid-cols-4 gap-4 mb-6">
      <div class="bg-white p-4 rounded-lg shadow">
        <div class="text-sm text-gray-500">إجمالي المبيعات</div>
        <div id="totalSales" class="text-2xl font-black text-green-600">0.00 ر.س</div>
      </div>
      <div class="bg-white p-4 rounded-lg shadow">
        <div class="text-sm text-gray-500">تكلفة البضاعة</div>
        <div id="totalCost" class="text-2xl font-black text-red-600">0.00 ر.س</div>
      </div>
      <div class="bg-white p-4 rounded-lg shadow">
        <div class="text-sm text-gray-500">صافي الربح</div>
        <div id="netProfit" class="text-2xl font-black text-navy">0.00 ر.س</div>
      </div>
      <div class="bg-white p-4 rounded-lg shadow">
        <div class="text-sm text-gray-500">إجمالي المشتريات</div>
        <div id="totalPurchases" class="text-2xl font-black text-orange-600">0.00 ر.س</div>
      </div>
    </div>

    <!-- جدولين -->
    <div class="grid md:grid-cols-2 gap-6">
      <div class="bg-white p-4 rounded-lg shadow">
        <h3 class="font-bold text-navy mb-3">أكثر 5 منتجات مبيعاً</h3>
        <table class="w-full">
          <thead class="bg-gray-100">
            <tr><th class="p-2 text-right">المنتج</th><th class="p-2 text-center">الكمية</th><th class="p-2 text-center">المبلغ</th></tr>
          </thead>
          <tbody id="topProductsBody">
            <tr><td colspan="3" class="text-center py-4 text-gray-500">لا توجد بيانات</td></tr>
          </tbody>
        </table>
      </div>

      <div class="bg-white p-4 rounded-lg shadow">
        <h3 class="font-bold text-navy mb-3">المنتجات الأقل في المخزون</h3>
        <table class="w-full">
          <thead class="bg-gray-100">
            <tr><th class="p-2 text-right">المنتج</th><th class="p-2 text-center">المتبقي</th></tr>
          </thead>
          <tbody id="lowStockBody">
            <tr><td colspan="2" class="text-center py-4 text-gray-500">لا توجد بيانات</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  const supabase = createClient('https://eeiegignudoedrlkuaqn.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlaWVnaWdudWRvZWRybGt1YXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODUwNzMsImV4cCI6MjA5MzA2MTA3M30.gtqh1KbGmXZ9VBkmpFCYtJetn1ZXPHcp5oX9sENBb2Q')

  let currentStore = null;

  async function init() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { window.location.href = 'alabarat.html'; return; }
    const { data: store } = await supabase.from('stores').select().eq('user_id', user.id).single();
    currentStore = store;
    document.getElementById('storeNameHeader').textContent = store.store_name;
    await loadReports();
  }

  function getDateRange() {
    const filter = document.getElementById('dateFilter').value;
    const now = new Date();
    let start = new Date();
    
    if (filter === 'today') {
      start.setHours(0,0,0,0);
    } else if (filter === 'week') {
      start.setDate(now.getDate() - 7);
    } else if (filter === 'month') {
      start.setDate(1);
      start.setHours(0,0,0,0);
    } else {
      start = new Date('2020-01-01');
    }
    return { start: start.toISOString(), end: now.toISOString() };
  }

  window.loadReports = async function() {
    if (!currentStore) return;
    const { start, end } = getDateRange();

    // 1. المبيعات
    const { data: sales } = await supabase.from('sales')
      .select('total_amount')
      .eq('store_id', currentStore.id)
      .gte('created_at', start)
      .lte('created_at', end);
    const totalSales = sales ? sales.reduce(function(sum, s) { return sum + parseFloat(s.total_amount || 0); }, 0) : 0;
    document.getElementById('totalSales').textContent = totalSales.toFixed(2) + ' ر.س';

    // 2. المشتريات
    const { data: purchases } = await supabase.from('purchases')
      .select('total_amount')
      .eq('store_id', currentStore.id)
      .gte('created_at', start)
      .lte('created_at', end);
    const totalPurchases = purchases ? purchases.reduce(function(sum, p) { return sum + parseFloat(p.total_amount || 0); }, 0) : 0;
    document.getElementById('totalPurchases').textContent = totalPurchases.toFixed(2) + ' ر.س';

    // 3. تكلفة البضاعة المباعة + الربح
    const { data: saleItems } = await supabase.from('sale_items')
      .select('qty, cost_price, unit_price, sales!inner(store_id, created_at)')
      .eq('sales.store_id', currentStore.id)
      .gte('sales.created_at', start)
      .lte('sales.created_at', end);
    
    let totalCost = 0, totalRevenue = 0;
    if (saleItems) {
      saleItems.forEach(function(item) {
        totalCost += item.qty * parseFloat(item.cost_price || 0);
        totalRevenue += item.qty * parseFloat(item.unit_price || 0);
      });
    }
    document.getElementById('totalCost').textContent = totalCost.toFixed(2) + ' ر.س';
    document.getElementById('netProfit').textContent = (totalRevenue - totalCost).toFixed(2) + ' ر.س';

    // 4. أكثر 5 منتجات مبيعاً
    const { data: topProducts } = await supabase.rpc('get_top_products', { 
      store_id_param: currentStore.id,
      start_date: start,
      end_date: end
    });
    
    const topBody = document.getElementById('topProductsBody');
    if (topProducts && topProducts.length > 0) {
      topBody.innerHTML = topProducts.map(function(p) {
        return '<tr class="border-b"><td class="p-2">' + p.product_name + '</td><td class="p-2 text-center">' + p.total_qty + '</td><td class="p-2 text-center font-bold">' + parseFloat(p.total_amount).toFixed(2) + '</td></tr>';
      }).join('');
    } else {
      topBody.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-gray-500">لا توجد مبيعات</td></tr>';
    }

    // 5. المنتجات الأقل مخزون
    const { data: lowStock } = await supabase.from('products')
      .select('name, stock_qty')
      .eq('store_id', currentStore.id)
      .lte('stock_qty', 5)
      .order('stock_qty', { ascending: true })
      .limit(5);
    
    const lowBody = document.getElementById('lowStockBody');
    if (lowStock && lowStock.length > 0) {
      lowBody.innerHTML = lowStock.map(function(p) {
        return '<tr class="border-b"><td class="p-2">' + p.name + '</td><td class="p-2 text-center font-bold text-red-600">' + p.stock_qty + '</td></tr>';
      }).join('');
    } else {
      lowBody.innerHTML = '<tr><td colspan="2" class="text-center py-4 text-gray-500">المخزون جيد</td></tr>';
    }
  }

  init();
</script>
</body>
</html>
