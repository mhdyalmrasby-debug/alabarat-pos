<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mahdi - Smart Grocery POS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
   .bg-navy { background-color: #0B2545; }
   .bg-gold { background-color: #F5B301; }
   .text-navy { color: #0B2545; }
  </style>
</head>
<body class="bg-navy min-h-screen flex items-center justify-center p-4">
  <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
    <div class="bg-navy text-white text-center py-8">
      <h1 class="text-4xl font-black">Mahdi</h1>
      <p class="text-gold mt-2">Smart Grocery POS System</p>
      <div class="mt-4 px-6">
        <div class="bg-gold/20 border border-gold rounded-lg p-3">
          <p class="text-gold text-sm font-bold">🚀 Project Under Development</p>
          <p class="text-white text-xs mt-1">Official launch coming soon</p>
          <a href="https://github.com/mhdyalmrasby-debug/alabarat-pos" target="_blank" class="text-gold text-xs underline mt-2 inline-block hover:opacity-80">
            View on GitHub →
          </a>
        </div>
      </div>
    </div>

    <div class="p-8">
      <!-- Login Form -->
      <div id="loginForm">
        <h2 class="text-2xl font-bold text-navy mb-6 text-center">Login</h2>
        <div class="space-y-4">
          <input id="loginEmail" type="email" placeholder="Email Address" class="w-full p-3 border-2 rounded-lg focus:border-navy outline-none">
          <input id="loginPassword" type="password" placeholder="Password" class="w-full p-3 border-2 rounded-lg focus:border-navy outline-none">
          <button onclick="login()" class="w-full bg-navy text-white py-3 rounded-lg font-bold text-lg hover:bg-blue-900">Sign In</button>
        </div>
        <p class="text-center mt-6 text-gray-600">
          Don't have an account?
          <button onclick="showSignup()" class="text-navy font-bold">Sign Up</button>
        </p>
      </div>

      <!-- Signup Form -->
      <div id="signupForm" class="hidden">
        <h2 class="text-2xl font-bold text-navy mb-6 text-center">Create Account</h2>
        <div class="space-y-4">
          <input id="storeName" type="text" placeholder="Store Name" class="w-full p-3 border-2 rounded-lg focus:border-navy outline-none">
          <input id="signupEmail" type="email" placeholder="Email Address" class="w-full p-3 border-2 rounded-lg focus:border-navy outline-none">
          <input id="signupPassword" type="password" placeholder="Password - min 6 chars" class="w-full p-3 border-2 rounded-lg focus:border-navy outline-none">
          <button onclick="signup()" class="w-full bg-gold text-navy py-3 rounded-lg font-bold text-lg hover:opacity-90">Create Account & Store</button>
        </div>
        <p class="text-center mt-6 text-gray-600">
          Already have an account?
          <button onclick="showLogin()" class="text-navy font-bold">Sign In</button>
        </p>
      </div>

      <div id="msg" class="text-center mt-4 font-bold"></div>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  const supabase = createClient(
    'https://eeiegignudoedrlkuaqn.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlaWVnaWdudWRvZWRybGt1YXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODUwNzMsImV4cCI6MjA5MzA2MTA3M30.gtqh1KbGmXZ9VBkmpFCYtJetn1ZXPHcp5oX9sENBb2Q'
  )

  function showMsg(text, type = 'info') {
    const msg = document.getElementById('msg');
    msg.textContent = text;
    if (type === 'error') {
      msg.className = 'text-center mt-4 font-bold text-red-600';
    } else if (type === 'success') {
      msg.className = 'text-center mt-4 font-bold text-green-600';
    } else {
      msg.className = 'text-center mt-4 font-bold text-blue-600';
    }
  }

  window.showSignup = function() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('signupForm').classList.remove('hidden');
    document.getElementById('msg').textContent = '';
  }

  window.showLogin = function() {
    document.getElementById('signupForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('msg').textContent = '';
  }

  window.login = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();

    if (!email ||!password) {
      showMsg('Please enter email and password', 'error');
      return;
    }

    showMsg('Signing in...', 'info');

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      showMsg('Error: ' + error.message, 'error');
    } else {
      showMsg('Login successful ✅', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    }
  }

  window.signup = async function() {
    const storeName = document.getElementById('storeName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value.trim();

    if (!storeName ||!email ||!password) {
      showMsg('Please fill all fields', 'error');
      return;
    }

    showMsg('Creating account...', 'info');

    // نرسل اسم المتجر مع بيانات اليوزر
    const { data, error } = await supabase.auth.signUp({
      email,
      password,
      options: {
        data: { store_name: storeName }
      }
    });

    if (error) {
      showMsg('Signup error: ' + error.message, 'error');
    } else {
      showMsg('Account created! Check your email to confirm ✅', 'success');
      setTimeout(() => showLogin(), 2000);
    }
  }
</script>
</body>
</html>
