<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مهدي - تسجيل الدخول</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
  .bg-navy { background-color: #0B2545; }
  .bg-gold { background-color: #F5B301; }
  .text-navy { color: #0B2545; }
  </style>
</head>
<body class="bg-navy min-h-screen flex items-center justify-center p-4">
  <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
    <div class="bg-navy text-white text-center py-8">
      <h1 class="text-4xl font-black">مهدي</h1>
      <p class="text-gold mt-2">نظام إدارة التموينات الذكي</p>
    </div>

    <div class="p-8">
      <!-- تسجيل دخول -->
      <div id="loginForm">
        <h2 class="text-2xl font-bold text-navy mb-6 text-center">تسجيل الدخول</h2>
        <div class="space-y-4">
          <input id="loginEmail" type="email" placeholder="البريد الإلكتروني" class="w-full p-3 border-2 rounded-lg focus:border-navy outline-none">
          <input id="loginPassword" type="password" placeholder="كلمة المرور" class="w-full p-3 border-2 rounded-lg focus:border-navy outline-none">
          <button onclick="login()" class="w-full bg-navy text-white py-3 rounded-lg font-bold text-lg hover:bg-blue-900">دخول</button>
        </div>
        <p class="text-center mt-6 text-gray-600">
          ما عندك حساب؟ 
          <button onclick="showSignup()" class="text-navy font-bold">سجل الآن</button>
        </p>
      </div>

      <!-- تسجيل جديد -->
      <div id="signupForm" class="hidden">
        <h2 class="text-2xl font-bold text-navy mb-6 text-center">حساب جديد</h2>
        <div class="space-y-4">
          <input id="storeName" type="text" placeholder="اسم المتجر" class="w-full p-3 border-2 rounded-lg focus:border-navy outline-none">
          <input id="signupEmail" type="email" placeholder="البريد الإلكتروني" class="w-full p-3 border-2 rounded-lg focus:border-navy outline-none">
          <input id="signupPassword" type="password" placeholder="كلمة المرور" class="w-full p-3 border-2 rounded-lg focus:border-navy outline-none">
          <button onclick="signup()" class="w-full bg-gold text-navy py-3 rounded-lg font-bold text-lg hover:opacity-90">إنشاء حساب ومتجر</button>
        </div>
        <p class="text-center mt-6 text-gray-600">
          عندك حساب؟ 
          <button onclick="showLogin()" class="text-navy font-bold">سجل دخول</button>
        </p>
      </div>

      <div id="msg" class="text-center mt-4 font-bold"></div>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  const supabase = createClient(
    'https://eeiegignudoedrlkuaqn.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlaWVnaWdudWRvZWRybGt1YXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODUwNzMsImV4cCI6MjA5MzA2MTA3M30.gtqh1KbGmXZ9VBkmpFCYtJetn1ZXPHcp5oX9sENBb2Q'
  )

  function showMsg(text, type = 'info') {
    const msg = document.getElementById('msg');
    msg.textContent = text;
    if (type === 'error') {
      msg.className = 'text-center mt-4 font-bold text-red-600';
    } else if (type === 'success') {
      msg.className = 'text-center mt-4 font-bold text-green-600';
    } else {
      msg.className = 'text-center mt-4 font-bold text-blue-600';
    }
  }

  window.showSignup = function() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('signupForm').classList.remove('hidden');
    document.getElementById('msg').textContent = '';
  }

  window.showLogin = function() {
    document.getElementById('signupForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('msg').textContent = '';
  }

  window.login = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();

    if (!email || !password) {
      showMsg('عبي الإيميل وكلمة المرور', 'error');
      return;
    }

    showMsg('جاري تسجيل الدخول...', 'info');

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      showMsg('خطأ: ' + error.message, 'error');
    } else {
      showMsg('تم تسجيل الدخول بنجاح ✅', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    }
  }

  window.signup = async function() {
    const storeName = document.getElementById('storeName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value.trim();

    if (!storeName || !email || !password) {
      showMsg('عبي كل الحقول', 'error');
      return;
    }

    if (password.length < 6) {
      showMsg('كلمة المرور لازم 6 أحرف على الأقل', 'error');
      return;
    }

    showMsg('جاري إنشاء الحساب والمتجر...', 'info');

    // 1. نسجل المستخدم
    const { data: authData, error: authError } = await supabase.auth.signUp({ email, password });

    if (authError) {
      showMsg('خطأ في التسجيل: ' + authError.message, 'error');
      return;
    }

    if (!authData.user) {
      showMsg('تم إرسال رابط التفعيل لإيميلك. فعّل الحساب وسجل دخول', 'info');
      return;
    }

    // 2. ننشئ المتجر تلقائي بنفس الـ user_id
    const { error: storeError } = await supabase
    .from('stores')
    .insert({
        user_id: authData.user.id,
        store_name: storeName  // ← هنا التعديل المهم
      });

    if (storeError) {
      showMsg('تم إنشاء الحساب لكن فشل إنشاء المتجر: ' + storeError.message, 'error');
      return;
    }

    showMsg('تم إنشاء الحساب والمتجر بنجاح ✅', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 1500);
  }

  // لو المستخدم مسجل دخول، حوله مباشرة
  supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
