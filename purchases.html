<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>المشتريات - العَبَرات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
.bg-navy { background-color: #0B2545; }.bg-gold { background-color: #F5B301; }
  </style>
</head>
<body class="bg-gray-100">
  <div class="bg-navy text-white p-4">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-black">فواتير المشتريات</h1>
      <a href="dashboard.html" class="bg-gold text-navy px-4 py-2 rounded font-bold">لوحة التحكم</a>
    </div>
  </div>

  <div class="container mx-auto p-6">
    <div class="bg-white p-6 rounded-lg shadow mb-6">
      <h3 class="text-xl font-bold text-navy mb-4">إضافة فاتورة شراء</h3>
      <form id="purchaseForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <select id="product_id" class="p-3 border rounded" required>
          <option value="">اختر المنتج</option>
        </select>
        <input id="qty" type="number" placeholder="الكمية" class="p-3 border rounded" required>
        <input id="cost_price" type="number" step="0.01" placeholder="سعر الشراء للوحدة" class="p-3 border rounded" required>
        <input id="expiry_date" type="date" placeholder="تاريخ الانتهاء" class="p-3 border rounded">
        <button type="submit" class="bg-gold text-navy font-bold p-3 rounded md:col-span-4">حفظ الفاتورة + تحديث المخزون</button>
      </form>
    </div>

    <div class="bg-white p-6 rounded-lg shadow">
      <h3 class="text-xl font-bold text-navy mb-4">آخر المشتريات</h3>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="p-3 text-right">التاريخ</th>
              <th class="p-3 text-right">المنتج</th>
              <th class="p-3 text-right">الكمية</th>
              <th class="p-3 text-right">سعر الوحدة</th>
              <th class="p-3 text-right">الإجمالي</th>
              <th class="p-3 text-right">تاريخ الانتهاء</th>
            </tr>
          </thead>
          <tbody id="purchasesTable"></tbody>
        </table>
      </div>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  const supabase = createClient('https://eeiegignudoedrlkuaqn.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlaWVnaWdudWRvZWRybGt1YXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODUwNzMsImV4cCI6MjA5MzA2MTA3M30.gtqh1KbGmXZ9VBkmpFCYtJetn1ZXPHcp5oX9sENBb2Q')

  let currentStore = null;

  async function init() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { window.location.href = 'alabarat.html'; return; }
    const { data: store } = await supabase.from('stores').select().eq('user_id', user.id).single();
    currentStore = store;
    loadProductsDropdown();
    loadPurchases();
  }

  async function loadProductsDropdown() {
    const { data: products } = await supabase.from('products').select('id,name').eq('store_id', currentStore.id);
    const select = document.getElementById('product_id');
    select.innerHTML = '<option value="">اختر المنتج</option>' + 
      (products || []).map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  }

  document.getElementById('purchaseForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const product_id = document.getElementById('product_id').value;
    const qty = parseInt(document.getElementById('qty').value);
    const cost_price = parseFloat(document.getElementById('cost_price').value);
    const expiry_date = document.getElementById('expiry_date').value || null;

    // 1. سجل فاتورة الشراء
    const { error: purchaseError } = await supabase.from('purchases').insert([{
      store_id: currentStore.id,
      product_id: product_id,
      qty: qty,
      cost_price: cost_price,
      expiry_date: expiry_date
    }]);

    if(purchaseError) { alert('خطأ: ' + purchaseError.message); return; }

    // 2. حدث المخزون + سعر التكلفة + تاريخ الانتهاء في جدول products
    const { data: currentProduct } = await supabase.from('products').select('stock_qty').eq('id', product_id).single();
    const newQty = (currentProduct.stock_qty || 0) + qty;

    const { error: updateError } = await supabase.from('products').update({
      stock_qty: newQty,
      cost_price: cost_price,
      expiry_date: expiry_date
    }).eq('id', product_id);

    if(updateError) {
      alert('تم حفظ الفاتورة لكن فشل تحديث المخزون: ' + updateError.message);
    } else {
      alert('تم حفظ الفاتورة وتحديث المخزون');
      e.target.reset();
      loadPurchases();
    }
  });

  async function loadPurchases() {
    const { data: purchases } = await supabase.from('purchases')
     .select('*, products(name)')
     .eq('store_id', currentStore.id)
     .order('created_at', { ascending: false })
     .limit(20);

    const tbody = document.getElementById('purchasesTable');
    tbody.innerHTML = (purchases || []).map(p => `
      <tr class="border-b">
        <td class="p-3">${new Date(p.created_at).toLocaleDateString('ar')}</td>
        <td class="p-3 font-bold">${p.products?.name || '-'}</td>
        <td class="p-3">${p.qty}</td>
        <td class="p-3">${Number(p.cost_price).toFixed(2)}</td>
        <td class="p-3">${(p.qty * p.cost_price).toFixed(2)}</td>
        <td class="p-3">${p.expiry_date || '-'}</td>
      </tr>
    `).join('') || '<tr><td colspan="6" class="p-4 text-center text-gray-400">لا توجد مشتريات</td></tr>';
  }

  init();
</script>
</body>
</html>
