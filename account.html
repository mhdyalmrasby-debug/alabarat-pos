<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المتجر</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // --- عدل هذي القيم الثلاث فقط ---
    const SUPABASE_URL = 'https://YOUR-PROJECT.supabase.co' 
    const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY'
    const WHATSAPP_NUMBER = '966500000000' // رقم واتساب التاجر مع مفتاح الدولة
    // --------------------------------

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // 1. نجيب slug من الرابط: shop.html?slug=ahmed-store
    const urlParams = new URLSearchParams(window.location.search)
    const slug = urlParams.get('slug')

    if(!slug) {
      document.body.innerHTML = `
        <div class="min-h-screen flex items-center justify-center bg-gray-100">
          <div class="text-center p-8">
            <h1 class="text-4xl font-black text-gray-800">404</h1>
            <p class="text-xl text-gray-600 mt-2">المتجر غير موجود</p>
          </div>
        </div>`
      throw new Error('No slug')
    }

    // 2. نجيب بيانات المتجر - بس لو منشور
    const { data: store, error } = await supabase
      .from('stores')
      .select('*')
      .eq('slug', slug)
      .eq('status', 'published')
      .single()

    if(error || !store) {
      document.body.innerHTML = `
        <div class="min-h-screen flex items-center justify-center bg-gray-100">
          <div class="text-center p-8">
            <h1 class="text-4xl font-black text-gray-800">المتجر مغلق</h1>
            <p class="text-xl text-gray-600 mt-2">هذا المتجر غير منشور حالياً</p>
          </div>
        </div>`
      throw new Error('Store not found or not published')
    }

    // 3. نجيب منتجات المتجر هذا
    const { data: products } = await supabase
      .from('products')
      .select('*')
      .eq('store_id', store.id)
      .gt('stock', 0)
      .order('created_at', { ascending: false })

    // 4. السلة
    let cart = JSON.parse(localStorage.getItem(`cart_${store.id}`) || '[]')
    
    function updateCartCount() {
      document.getElementById('cart-count').textContent = cart.length
    }

    window.addToCart = (product) => {
      cart.push(product)
      localStorage.setItem(`cart_${store.id}`, JSON.stringify(cart))
      updateCartCount()
      alert(`تمت إضافة ${product.name} للسلة`)
    }

    window.checkoutWhatsApp = () => {
      if(cart.length === 0) {
        alert('السلة فاضية')
        return
      }
      let msg = `طلب جديد من متجر ${store.name}%0A%0A`
      let total = 0
      cart.forEach((p, i) => {
        msg += `${i+1}. ${p.name} - ${p.price} ر.س%0A`
        total += parseFloat(p.price)
      })
      msg += `%0Aالإجمالي: ${total} ر.س`
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, '_blank')
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.title = store.name
      document.getElementById('store-name').textContent = store.name
      document.getElementById('store-desc').textContent = store.description || 'أهلاً بكم في متجرنا'
      updateCartCount()

      // 5. نعرض المنتجات
      const productsDiv = document.getElementById('products')
      if(!products || products.length === 0) {
        productsDiv.innerHTML = '<p class="text-center col-span-full text-gray-500">لا توجد منتجات حالياً</p>'
        return
      }
      
      products.forEach(p => {
        productsDiv.innerHTML += `
          <div class="bg-white p-4 rounded-xl shadow-md hover:shadow-lg transition">
            <div class="h-48 bg-gray-200 rounded-lg mb-3 flex items-center justify-center">
              <span class="text-gray-400">صورة المنتج</span>
            </div>
            <h3 class="font-bold text-lg">${p.name}</h3>
            <p class="text-gray-600 text-sm mt-1">${p.description || ''}</p>
            <div class="flex justify-between items-center mt-4">
              <span class="text-2xl font-black text-blue-600">${p.price} <span class="text-sm">ر.س</span></span>
              <button onclick='addToCart(${JSON.stringify(p)})' class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold">
                أضف للسلة
              </button>
            </div>
          </div>
        `
      })
    })
  </script>
</head>
<body class="bg-gray-50">
  <!-- الهيدر -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <div>
        <h1 id="store-name" class="text-2xl font-black text-gray-800"></h1>
        <p id="store-desc" class="text-sm text-gray-500"></p>
      </div>
      <button onclick="checkoutWhatsApp()" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"/></svg>
        السلة (<span id="cart-count">0</span>)
      </button>
    </div>
  </header>

  <!-- المنتجات -->
  <main class="max-w-6xl mx-auto px-4 py-8">
    <h2 class="text-3xl font-black mb-6 text-gray-800">منتجاتنا</h2>
    <div id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <!-- المنتجات تنضاف هنا بالـ JS -->
    </div>
  </main>

  <!-- الفوتر -->
  <footer class="bg-gray-800 text-white mt-16 py-8">
    <div class="max-w-6xl mx-auto px-4 text-center">
      <p class="font-bold" id="footer-store-name"></p>
      <p class="text-sm text-gray-400 mt-2">جميع الحقوق محفوظة</p>
    </div>
  </footer>

  <script>
    // عشان الفوتر
    document.addEventListener('DOMContentLoaded', () => {
      const name = document.getElementById('store-name')?.textContent
      if(name) document.getElementById('footer-store-name').textContent = name
    })
  </script>
</body>
</html>
