<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق العبرات</title>
    <link rel="icon" href="data:,">
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C8A96E;
            --gold-light: #E8C98A;
            --gold-dark: #9A7A45;
            --dark: #0D0D0D;
            --dark-2: #161616;
            --dark-3: #1E1E1E;
            --dark-4: #2A2A2A;
            --text: #F0EDE8;
            --text-muted: #9A9690;
            --green: #2ECC71;
            --red: #E74C3C;
            --card-bg: rgba(26,24,22,0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── Background Pattern ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(ellipse 80% 50% at 20% 10%, rgba(200,169,110,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 90%, rgba(200,169,110,0.04) 0%, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C8A96E' fill-opacity='0.025'%3E%3Cpath d='M30 0L60 30L30 60L0 30Z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Navbar ─── */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13,13,13,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(200,169,110,0.2);
            padding: 0 2rem;
        }

        .navbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 4px 15px rgba(200,169,110,0.3);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .brand-name {
            font-size: 1.35rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-sub {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn-admin {
            padding: 0.5rem 1.2rem;
            border: 1px solid rgba(200,169,110,0.3);
            background: transparent;
            color: var(--gold);
            border-radius: 10px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.25s;
        }

        .btn-admin:hover {
            background: rgba(200,169,110,0.1);
            border-color: var(--gold);
        }

        .btn-cart {
            position: relative;
            padding: 0.55rem 1.4rem;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--dark);
            border: none;
            border-radius: 10px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.25s;
            box-shadow: 0 4px 15px rgba(200,169,110,0.25);
        }

        .btn-cart:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(200,169,110,0.35);
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            left: -8px;
            min-width: 22px;
            height: 22px;
            background: var(--red);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 800;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            border: 2px solid var(--dark);
            transition: transform 0.2s;
        }

        .cart-badge.bump {
            animation: bump 0.3s ease;
        }

        @keyframes bump {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.4); }
        }

        /* ─── Search Bar ─── */
        .search-section {
            max-width: 1400px;
            margin: 2rem auto 1.5rem;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }

        .search-card {
            background: var(--dark-3);
            border: 1px solid rgba(200,169,110,0.15);
            border-radius: 18px;
            padding: 1.5rem;
        }

        .search-title {
            font-size: 0.8rem;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 600px) {
            .search-row { grid-template-columns: 1fr; }
        }

        .search-input-wrap {
            position: relative;
        }

        .search-input-wrap .icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            font-size: 1rem;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            background: var(--dark-4);
            border: 1px solid rgba(200,169,110,0.15);
            border-radius: 12px;
            padding: 0.8rem 2.8rem 0.8rem 1rem;
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(200,169,110,0.1);
        }

        /* ─── Stats Bar ─── */
        .stats-bar {
            max-width: 1400px;
            margin: 0 auto 2rem;
            padding: 0 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .stat-chip {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 1rem;
            background: var(--dark-3);
            border: 1px solid rgba(200,169,110,0.12);
            border-radius: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .stat-chip strong {
            color: var(--gold);
            font-weight: 700;
        }

        /* ─── Container ─── */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
            position: relative;
            z-index: 1;
        }

        /* ─── Store Block ─── */
        .store-block {
            margin-bottom: 2.5rem;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .store-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(200,169,110,0.15);
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .store-info {
            display: flex;
            align-items: center;
            gap: 0.85rem;
        }

        .store-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 4px 15px rgba(200,169,110,0.2);
            flex-shrink: 0;
        }

        .store-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
        }

        .store-id {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: monospace;
            letter-spacing: 0.05em;
        }

        .store-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-gold {
            background: rgba(200,169,110,0.15);
            color: var(--gold);
            border: 1px solid rgba(200,169,110,0.3);
        }

        /* ─── Products Grid ─── */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.25rem;
        }

        /* ─── Product Card ─── */
        .product-card {
            background: var(--dark-3);
            border: 1px solid rgba(200,169,110,0.1);
            border-radius: 18px;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
            cursor: default;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: rgba(200,169,110,0.35);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(200,169,110,0.15);
        }

        .product-image {
            height: 140px;
            background: linear-gradient(135deg, var(--dark-4) 0%, rgba(200,169,110,0.08) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-image::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 60%, rgba(200,169,110,0.06));
        }

        .product-image-emoji {
            font-size: 3.5rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .product-qty-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(46,204,113,0.15);
            border: 1px solid rgba(46,204,113,0.4);
            color: var(--green);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
        }

        .product-body {
            padding: 1rem;
        }

        .product-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.35rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.85rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }

        .product-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .product-price {
            font-size: 1.25rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        .product-price span {
            font-size: 0.75rem;
            font-weight: 500;
        }

        .btn-add {
            flex: 1;
            padding: 0.55rem 0;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--dark);
            border: none;
            border-radius: 10px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
        }

        .btn-add:hover {
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            box-shadow: 0 4px 15px rgba(200,169,110,0.3);
        }

        .btn-add:active { transform: scale(0.97); }

        .btn-add.added {
            background: linear-gradient(135deg, var(--green), #27ae60);
        }

        /* ─── Empty & Loading ─── */
        .state-msg {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-muted);
        }

        .state-msg .icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .state-msg h3 { font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
        .state-msg p { font-size: 0.9rem; }

        .loader {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            padding: 4rem;
        }

        .loader span {
            width: 10px;
            height: 10px;
            background: var(--gold);
            border-radius: 50%;
            animation: pulse 1.2s ease-in-out infinite;
        }

        .loader span:nth-child(2) { animation-delay: 0.2s; }
        .loader span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%,80%,100% { transform: scale(0.7); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ─── Cart Drawer ─── */
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .cart-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .cart-drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: min(440px, 100vw);
            height: 100vh;
            background: var(--dark-2);
            border-right: 1px solid rgba(200,169,110,0.2);
            z-index: 201;
            display: flex;
            flex-direction: column;
            transform: translateX(-100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cart-drawer.open {
            transform: translateX(0);
        }

        .cart-head {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(200,169,110,0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cart-title {
            font-size: 1.3rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .btn-close-cart {
            width: 36px;
            height: 36px;
            background: var(--dark-4);
            border: 1px solid rgba(200,169,110,0.15);
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-close-cart:hover { color: var(--text); border-color: var(--gold); }

        .cart-body {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.5rem;
        }

        .cart-body::-webkit-scrollbar { width: 4px; }
        .cart-body::-webkit-scrollbar-track { background: var(--dark-3); }
        .cart-body::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }

        .cart-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 1rem;
            color: var(--text-muted);
        }

        .cart-empty-icon { font-size: 4rem; opacity: 0.5; }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .cart-item-img {
            width: 56px;
            height: 56px;
            background: var(--dark-4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
            border: 1px solid rgba(200,169,110,0.1);
        }

        .cart-item-info { flex: 1; min-width: 0; }

        .cart-item-name {
            font-weight: 700;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.25rem;
        }

        .cart-item-price {
            font-size: 0.85rem;
            color: var(--gold);
            font-weight: 600;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            background: var(--dark-4);
            border: 1px solid rgba(200,169,110,0.2);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-family: 'Tajawal', sans-serif;
        }

        .qty-btn:hover { border-color: var(--gold); color: var(--gold); }

        .qty-display {
            min-width: 24px;
            text-align: center;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .btn-remove-item {
            width: 28px;
            height: 28px;
            background: rgba(231,76,60,0.1);
            border: 1px solid rgba(231,76,60,0.2);
            border-radius: 8px;
            color: var(--red);
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-remove-item:hover { background: rgba(231,76,60,0.2); }

        .cart-footer {
            padding: 1.5rem;
            border-top: 1px solid rgba(200,169,110,0.15);
        }

        .cart-summary {
            background: var(--dark-3);
            border: 1px solid rgba(200,169,110,0.12);
            border-radius: 14px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .summary-row:last-child {
            margin-bottom: 0;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text);
        }

        .summary-row:last-child .val { color: var(--gold); }

        .btn-checkout {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--dark);
            border: none;
            border-radius: 14px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(200,169,110,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-checkout:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(200,169,110,0.4);
        }

        .btn-checkout:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ─── Checkout Modal ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(6px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal-box {
            background: var(--dark-2);
            border: 1px solid rgba(200,169,110,0.25);
            border-radius: 22px;
            width: min(480px, 100%);
            padding: 2rem;
            transform: scale(0.95);
            transition: transform 0.3s;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }

        .modal-overlay.open .modal-box {
            transform: scale(1);
        }

        .modal-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .modal-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, rgba(200,169,110,0.2), rgba(200,169,110,0.05));
            border: 1px solid rgba(200,169,110,0.3);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 1rem;
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 0.4rem;
        }

        .modal-sub { font-size: 0.9rem; color: var(--text-muted); }

        .form-group { margin-bottom: 1.25rem; }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 0.5rem;
            letter-spacing: 0.02em;
        }

        .form-input {
            width: 100%;
            background: var(--dark-4);
            border: 1px solid rgba(200,169,110,0.15);
            border-radius: 12px;
            padding: 0.85rem 1rem;
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input::placeholder { color: var(--text-muted); }

        .form-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(200,169,110,0.1);
        }

        .form-input.error { border-color: var(--red); }

        .form-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.35rem;
        }

        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn-cancel {
            padding: 0.85rem;
            background: var(--dark-4);
            border: 1px solid rgba(200,169,110,0.15);
            border-radius: 12px;
            color: var(--text-muted);
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel:hover { color: var(--text); border-color: var(--gold); }

        .btn-confirm {
            padding: 0.85rem;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--dark);
            border: none;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-confirm:hover { box-shadow: 0 4px 15px rgba(200,169,110,0.3); }
        .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ─── Success Toast ─── */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            z-index: 500;
            box-shadow: 0 8px 30px rgba(46,204,113,0.35);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ─── Divider ─── */
        .divider {
            height: 1px;
            background: linear-gradient(to left, transparent, rgba(200,169,110,0.3), transparent);
            margin: 2rem 0;
        }

        /* ─── Responsive ─── */
        @media (max-width: 768px) {
            .navbar-inner { padding: 0 1rem; }
            .search-section, .stats-bar, .main { padding-inline: 1rem; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.85rem; }
            .brand-sub { display: none; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="navbar-inner">
        <a href="#" class="brand">
            <div class="brand-icon">🏛</div>
            <div class="brand-text">
                <span class="brand-name">سوق العبرات</span>
                <span class="brand-sub">المنصة التجارية الموثوقة</span>
            </div>
        </a>
        <div class="nav-actions">
            <a href="index.html" class="btn-admin">⚙ لوحة الإدارة</a>
            <button class="btn-cart" onclick="openCart()">
                <span>🛒</span>
                <span>سلتي</span>
                <span class="cart-badge" id="cartCount">0</span>
            </button>
        </div>
    </div>
</nav>

<!-- Search -->
<section class="search-section">
    <div class="search-card">
        <div class="search-title">🔍 بحث وتصفية</div>
        <div class="search-row">
            <div class="search-input-wrap">
                <span class="icon">📦</span>
                <input type="text" class="search-input" id="searchProduct" placeholder="ابحث عن منتج...">
            </div>
            <div class="search-input-wrap">
                <span class="icon">🏪</span>
                <input type="text" class="search-input" id="searchStore" placeholder="ابحث برقم المتجر...">
            </div>
        </div>
    </div>
</section>

<!-- Stats Bar -->
<div class="stats-bar" id="statsBar"></div>

<!-- Main Content -->
<main class="main" id="storesContainer">
    <div class="loader">
        <span></span><span></span><span></span>
    </div>
</main>

<!-- Cart Drawer -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
    <div class="cart-head">
        <div class="cart-title">🛒 سلة المشتريات</div>
        <button class="btn-close-cart" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-body" id="cartBody">
        <div class="cart-empty">
            <div class="cart-empty-icon">🛒</div>
            <p>سلتك فاضية حالياً</p>
            <small style="color:var(--text-muted);font-size:0.8rem">أضف منتجات وابدأ التسوق</small>
        </div>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none">
        <div class="cart-summary">
            <div class="summary-row">
                <span>عدد المنتجات</span>
                <span class="val" id="cartItemCount">0</span>
            </div>
            <div class="summary-row">
                <span>الإجمالي الكلي</span>
                <span class="val" id="cartTotalPrice">0 ريال</span>
            </div>
        </div>
        <button class="btn-checkout" onclick="openCheckout()">
            <span>✅</span>
            <span>تأكيد الطلب</span>
        </button>
    </div>
</div>

<!-- Checkout Modal -->
<div class="modal-overlay" id="checkoutModal">
    <div class="modal-box">
        <div class="modal-header">
            <div class="modal-icon">📋</div>
            <div class="modal-title">تفاصيل الطلب</div>
            <div class="modal-sub">أدخل بياناتك ليتواصل معك صاحب المتجر</div>
        </div>

        <div class="form-group">
            <label class="form-label">الاسم الكامل *</label>
            <input type="text" class="form-input" id="customerName" placeholder="مثال: محمد أحمد العمري">
        </div>

        <div class="form-group">
            <label class="form-label">رقم الجوال *</label>
            <input type="tel" class="form-input" id="customerPhone" placeholder="05XXXXXXXX" maxlength="10">
            <div class="form-hint">رقم سعودي يبدأ بـ 05</div>
        </div>

        <div class="form-group">
            <label class="form-label">العنوان للتوصيل (اختياري)</label>
            <input type="text" class="form-input" id="customerAddress" placeholder="المدينة، الحي، الشارع...">
        </div>

        <div class="form-group">
            <label class="form-label">ملاحظات إضافية (اختياري)</label>
            <input type="text" class="form-input" id="orderNotes" placeholder="أي طلبات خاصة...">
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeCheckout()">إلغاء</button>
            <button class="btn-confirm" id="confirmBtn" onclick="submitOrder()">
                <span>🚀</span>
                <span>إرسال الطلب</span>
            </button>
        </div>
    </div>
</div>

<!-- Success Toast -->
<div class="toast" id="toast">✅ تم إرسال طلبك بنجاح!</div>

<script>
const SUPABASE_URL = 'https://jgekcfwacinmxkylrdpm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnZWtjZndhY2lubXhreWxyZHBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTQxNTYsImV4cCI6MjA5NDI3MDE1Nn0._RA5UoWuUyPM0G4aGd9m2LOcsaEiMan2-Lvx60Cnf4Y';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allProducts = [];
let filteredProducts = [];
let cart = JSON.parse(localStorage.getItem('cart') || '[]');

// ─── Load Products ───
async function loadProducts() {
    const { data, error } = await supabaseClient
        .from('products')
        .select('*')
        .gt('quantity', 0)
        .order('created_at', { ascending: false });

    if (error) {
        document.getElementById('storesContainer').innerHTML = `
            <div class="state-msg">
                <div class="icon">⚠️</div>
                <h3>خطأ في تحميل المنتجات</h3>
                <p>${error.message}</p>
            </div>`;
        return;
    }

    allProducts = data || [];
    filteredProducts = [...allProducts];
    updateStats();
    renderStores();
    syncCartCount();
}

// ─── Stats ───
function updateStats() {
    const stores = new Set(filteredProducts.map(p => p.user_id)).size;
    const products = filteredProducts.length;
    document.getElementById('statsBar').innerHTML = `
        <div class="stat-chip">🏪 المتاجر: <strong>${stores}</strong></div>
        <div class="stat-chip">📦 المنتجات: <strong>${products}</strong></div>
        <div class="stat-chip">✅ جميعها متوفرة</div>
    `;
}

// ─── Render Stores ───
const EMOJIS = ['📦','🎁','💎','⭐','🌟','🛍','🏷','✨'];
function getEmoji(name) {
    let h = 0;
    for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
    return EMOJIS[h % EMOJIS.length];
}

function renderStores() {
    const container = document.getElementById('storesContainer');
    const grouped = {};

    filteredProducts.forEach(p => {
        if (!grouped[p.user_id]) grouped[p.user_id] = { id: p.user_id, products: [] };
        grouped[p.user_id].products.push(p);
    });

    const keys = Object.keys(grouped);
    if (keys.length === 0) {
        container.innerHTML = `
            <div class="state-msg">
                <div class="icon">🔍</div>
                <h3>لا توجد نتائج</h3>
                <p>جرّب كلمات بحث مختلفة</p>
            </div>`;
        return;
    }

    container.innerHTML = keys.map((storeId, idx) => {
        const store = grouped[storeId];
        const shortId = storeId.substring(0, 8).toUpperCase();
        const delay = idx * 80;
        return `
        <div class="store-block" style="animation-delay:${delay}ms">
            <div class="store-header">
                <div class="store-info">
                    <div class="store-avatar">🏪</div>
                    <div>
                        <div class="store-name">متجر ${shortId}</div>
                        <div class="store-id">${storeId}</div>
                    </div>
                </div>
                <div class="store-meta">
                    <span class="badge badge-gold">${store.products.length} منتج</span>
                </div>
            </div>
            <div class="products-grid">
                ${store.products.map(p => `
                <div class="product-card" id="card-${p.id}">
                    <div class="product-image">
                        <span class="product-image-emoji">${getEmoji(p.name)}</span>
                        <span class="product-qty-badge">متوفر ${p.quantity}</span>
                    </div>
                    <div class="product-body">
                        <div class="product-name">${p.name}</div>
                        <div class="product-desc">${p.description || 'لا يوجد وصف'}</div>
                        <div class="product-footer">
                            <div class="product-price">${Number(p.price).toFixed(2)} <span>ر.س</span></div>
                            <button class="btn-add" onclick="addToCart('${p.id}')" id="btn-${p.id}">
                                ＋ أضف
                            </button>
                        </div>
                    </div>
                </div>
                `).join('')}
            </div>
        </div>
        ${idx < keys.length - 1 ? '<div class="divider"></div>' : ''}
        `;
    }).join('');
}

// ─── Cart Logic ───
function saveCart() {
    localStorage.setItem('cart', JSON.stringify(cart));
}

function syncCartCount() {
    const count = cart.reduce((s, i) => s + i.qty, 0);
    const badge = document.getElementById('cartCount');
    badge.textContent = count;
    badge.classList.remove('bump');
    void badge.offsetWidth;
    badge.classList.add('bump');
}

function addToCart(productId) {
    const product = allProducts.find(p => p.id == productId);
    if (!product) return;
    const existing = cart.find(i => i.id == productId);

    if (existing) {
        if (existing.qty >= product.quantity) {
            showToastError('الكمية المطلوبة غير متوفرة');
            return;
        }
        existing.qty += 1;
    } else {
        cart.push({ ...product, qty: 1 });
    }

    saveCart();
    syncCartCount();
    flashBtn(productId);
}

function flashBtn(productId) {
    const btn = document.getElementById(`btn-${productId}`);
    if (!btn) return;
    btn.classList.add('added');
    btn.textContent = '✓ تمت الإضافة';
    setTimeout(() => {
        btn.classList.remove('added');
        btn.textContent = '＋ أضف';
    }, 1200);
}

function changeQty(productId, delta) {
    const item = cart.find(i => i.id == productId);
    if (!item) return;
    const product = allProducts.find(p => p.id == productId);
    const maxQty = product ? product.quantity : 99;
    item.qty = Math.max(1, Math.min(item.qty + delta, maxQty));
    saveCart();
    syncCartCount();
    renderCartBody();
}

function removeFromCart(productId) {
    cart = cart.filter(i => i.id != productId);
    saveCart();
    syncCartCount();
    renderCartBody();
}

// ─── Cart Drawer ───
function openCart() {
    renderCartBody();
    document.getElementById('cartOverlay').classList.add('open');
    document.getElementById('cartDrawer').classList.add('open');
}

function closeCart() {
    document.getElementById('cartOverlay').classList.remove('open');
    document.getElementById('cartDrawer').classList.remove('open');
}

function renderCartBody() {
    const body = document.getElementById('cartBody');
    const footer = document.getElementById('cartFooter');

    if (cart.length === 0) {
        body.innerHTML = `
            <div class="cart-empty">
                <div class="cart-empty-icon">🛒</div>
                <p>سلتك فاضية حالياً</p>
                <small style="color:var(--text-muted);font-size:0.8rem">أضف منتجات وابدأ التسوق</small>
            </div>`;
        footer.style.display = 'none';
        return;
    }

    let total = 0;
    let totalQty = 0;

    body.innerHTML = cart.map(item => {
        const sub = item.price * item.qty;
        total += sub;
        totalQty += item.qty;
        return `
        <div class="cart-item">
            <div class="cart-item-img">${getEmoji(item.name)}</div>
            <div class="cart-item-info">
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-price">${Number(sub).toFixed(2)} ر.س</div>
            </div>
            <div class="cart-item-controls">
                <button class="qty-btn" onclick="changeQty('${item.id}', -1)">−</button>
                <span class="qty-display">${item.qty}</span>
                <button class="qty-btn" onclick="changeQty('${item.id}', 1)">＋</button>
                <button class="btn-remove-item" onclick="removeFromCart('${item.id}')">🗑</button>
            </div>
        </div>`;
    }).join('');

    document.getElementById('cartItemCount').textContent = totalQty + ' قطعة';
    document.getElementById('cartTotalPrice').textContent = total.toFixed(2) + ' ر.س';
    footer.style.display = 'block';
}

// ─── Checkout Modal ───
function openCheckout() {
    if (cart.length === 0) return;
    closeCart();
    document.getElementById('checkoutModal').classList.add('open');
}

function closeCheckout() {
    document.getElementById('checkoutModal').classList.remove('open');
}

async function submitOrder() {
    const name = document.getElementById('customerName').value.trim();
    const phone = document.getElementById('customerPhone').value.trim();
    const address = document.getElementById('customerAddress').value.trim();
    const notes = document.getElementById('orderNotes').value.trim();

    // Validation
    const nameInput = document.getElementById('customerName');
    const phoneInput = document.getElementById('customerPhone');
    nameInput.classList.remove('error');
    phoneInput.classList.remove('error');

    if (!name) { nameInput.classList.add('error'); nameInput.focus(); return; }
    if (!phone || !/^05\d{8}$/.test(phone)) {
        phoneInput.classList.add('error');
        phoneInput.focus();
        return;
    }

    const btn = document.getElementById('confirmBtn');
    btn.disabled = true;
    btn.innerHTML = '<span>⏳</span><span>جاري الإرسال...</span>';

    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    const storeId = cart[0].user_id;

    const { error } = await supabaseClient.from('orders').insert([{
        store_id: storeId,
        total_amount: total,
        items: cart,
        customer_name: name,
        customer_phone: phone,
        customer_address: address || null,
        notes: notes || null,
        status: 'جديد'
    }]);

    btn.disabled = false;
    btn.innerHTML = '<span>🚀</span><span>إرسال الطلب</span>';

    if (error) {
        alert('خطأ في إرسال الطلب: ' + error.message);
        return;
    }

    // Success
    closeCheckout();
    cart = [];
    saveCart();
    syncCartCount();
    ['customerName','customerPhone','customerAddress','orderNotes'].forEach(id => {
        document.getElementById(id).value = '';
    });
    showToast();
}

// ─── Toast ───
function showToast() {
    const t = document.getElementById('toast');
    t.textContent = '✅ تم إرسال طلبك! صاحب المتجر بيتواصل معك';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
}

function showToastError(msg) {
    const t = document.getElementById('toast');
    t.style.background = 'linear-gradient(135deg,#e74c3c,#c0392b)';
    t.textContent = '⚠️ ' + msg;
    t.classList.add('show');
    setTimeout(() => {
        t.classList.remove('show');
        t.style.background = '';
    }, 3000);
}

// ─── Search ───
function applyFilters() {
    const pSearch = document.getElementById('searchProduct').value.toLowerCase();
    const sSearch = document.getElementById('searchStore').value.toLowerCase();
    filteredProducts = allProducts.filter(p => {
        const matchP = p.name.toLowerCase().includes(pSearch) ||
            (p.description && p.description.toLowerCase().includes(pSearch));
        const matchS = p.user_id.toLowerCase().includes(sSearch);
        return matchP && matchS;
    });
    updateStats();
    renderStores();
}

document.getElementById('searchProduct').addEventListener('input', applyFilters);
document.getElementById('searchStore').addEventListener('input', applyFilters);

// Close modal on overlay click
document.getElementById('checkoutModal').addEventListener('click', function(e) {
    if (e.target === this) closeCheckout();
});

loadProducts();
</script>
</body>
</html>
