<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق العبرات - جميع المتاجر</title>
    <link rel="icon" href="data:,">
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
       .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-7xl mx-auto p-6">
        <div class="bg-white rounded-xl shadow p-6 mb-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-indigo-600">سوق العبرات</h1>
                    <p class="text-gray-500">تصفح كل المتاجر والمنتجات</p>
                </div>
                <div class="flex gap-3">
                    <a href="index.html" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700">دخول المدير</a>
                    <button onclick="openCart()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg relative">
                        🛒 السلة
                        <span id="cartCount" class="bg-red-500 text-xs px-2 py-1 rounded-full absolute -top-2 -right-2">0</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <input type="text" id="searchProduct" placeholder="ابحث عن منتج..." class="px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                <input type="text" id="searchStore" placeholder="ابحث برقم المتجر..." class="px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500">
            </div>
        </div>

        <div id="storesContainer">
            <p class="text-center text-gray-500 py-10">جاري تحميل المنتجات...</p>
        </div>
    </div>

    <div id="cartModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl max-w-md w-full p-6 max-h- overflow-y-auto">
            <h3 class="text-xl font-bold mb-4">سلة المشتريات</h3>
            <div id="cartItems"></div>
            <div class="border-t mt-4 pt-4">
                <div class="flex justify-between font-bold text-lg mb-4">
                    <span>الإجمالي:</span>
                    <span id="cartTotal">0 ريال</span>
                </div>
                <button onclick="checkout()" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700">تأكيد الطلب</button>
                <button onclick="closeCart()" class="w-full bg-gray-200 py-2 rounded-lg mt-2 hover:bg-gray-300">إغلاق</button>
            </div>
        </div>
    </div>

<script>
const SUPABASE_URL = 'https://jgekcfwacinmxkylrdpm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnZWtjZndhY2lubXhreWxyZHBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTQxNTYsImV4cCI6MjA5NDI3MDE1Nn0._RA5UoWuUyPM0G4aGd9m2LOcsaEiMan2-Lvx60Cnf4Y';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allProducts = [];
let filteredProducts = [];
let cart = [];

async function loadProducts() {
    const { data, error } = await supabaseClient
   .from('products')
   .select('*')
   .gt('quantity', 0)
   .order('created_at', { ascending: false });

    if (error) {
        document.getElementById('storesContainer').innerHTML = '<p class="text-center text-red-500">خطأ في تحميل المنتجات</p>';
        return;
    }

    allProducts = data;
    filteredProducts = data;
    renderStores();
}

function renderStores() {
    const container = document.getElementById('storesContainer');
    const grouped = {};

    filteredProducts.forEach(p => {
        const storeId = p.user_id;
        if (!grouped[storeId]) {
            grouped[storeId] = { id: storeId, products: [] };
        }
        grouped[storeId].products.push(p);
    });

    if (Object.keys(grouped).length === 0) {
        container.innerHTML = '<p class="text-center text-gray-500 py-10">لا توجد منتجات متاحة</p>';
        return;
    }

    container.innerHTML = Object.keys(grouped).map(storeId => {
        const store = grouped[storeId];
        const shortId = storeId.substring(0, 8);
        return `
            <div class="bg-white rounded-xl shadow mb-6 p-6">
                <div class="border-b pb-3 mb-4">
                    <h2 class="text-2xl font-bold text-indigo-600">🏪 متجر ${shortId}</h2>
                    <p class="text-sm text-gray-500">${store.products.length} منتج متاح</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    ${store.products.map(p => `
                        <div class="border rounded-xl p-4 hover:shadow-lg transition">
                            <div class="h-32 bg-gradient-to-br from-indigo-100 to-purple-100 rounded-lg mb-3 flex items-center justify-center">
                                <span class="text-4xl">📦</span>
                            </div>
                            <h3 class="font-bold text-lg mb-1">${p.name}</h3>
                            <p class="text-gray-500 text-sm mb-2 line-clamp-2">${p.description || ''}</p>
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-xl font-bold text-indigo-600">${p.price} ريال</span>
                                <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">متوفر: ${p.quantity}</span>
                            </div>
                            <button onclick="addToCart('${p.id}')" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 text-sm">
                                أضف للسلة
                            </button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }).join('');
}

function applyFilters() {
    const productSearch = document.getElementById('searchProduct').value.toLowerCase();
    const storeSearch = document.getElementById('searchStore').value.toLowerCase();
    filteredProducts = allProducts.filter(p => {
        const matchProduct = p.name.toLowerCase().includes(productSearch) || (p.description && p.description.toLowerCase().includes(productSearch));
        const matchStore = p.user_id.toLowerCase().includes(storeSearch);
        return matchProduct && matchStore;
    });
    renderStores();
}

function addToCart(productId) {
    const product = allProducts.find(p => p.id == productId);
    const existing = cart.find(item => item.id == productId);
    if (existing) {
        if (existing.quantity < product.quantity) {
            existing.quantity += 1;
        } else {
            alert('الكمية غير متوفرة');
            return;
        }
    } else {
        cart.push({...product, quantity: 1});
    }
    updateCartCount();
}

function updateCartCount() {
    const count = cart.reduce((sum, item) => sum + item.quantity, 0);
    document.getElementById('cartCount').textContent = count;
}

function openCart() {
    const cartItems = document.getElementById('cartItems');
    let total = 0;
    if (cart.length === 0) {
        cartItems.innerHTML = '<p class="text-center text-gray-500 py-4">السلة فاضية</p>';
    } else {
        cartItems.innerHTML = cart.map(item => {
            total += item.price * item.quantity;
            return `
                <div class="flex justify-between items-center border-b py-2">
                    <div>
                        <p class="font-semibold">${item.name}</p>
                        <p class="text-sm text-gray-500">${item.quantity} × ${item.price} ريال</p>
                    </div>
                    <button onclick="removeFromCart('${item.id}')" class="text-red-500">حذف</button>
                </div>
            `;
        }).join('');
    }
    document.getElementById('cartTotal').textContent = total.toFixed(2) + ' ريال';
    document.getElementById('cartModal').classList.remove('hidden');
}

function closeCart() {
    document.getElementById('cartModal').classList.add('hidden');
}

function removeFromCart(productId) {
    cart = cart.filter(item => item.id!= productId);
    updateCartCount();
    openCart();
}

async function checkout() {
    if (cart.length === 0) return;

    const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
    const storeId = cart[0].user_id;

    const customerName = prompt('اكتب اسمك:');
    if (!customerName) return;

    const customerPhone = prompt('اكتب رقم جوالك:');
    if (!customerPhone) return;

    const { error } = await supabaseClient.from('orders').insert([{
        store_id: storeId,
        total_amount: total,
        items: cart,
        customer_name: customerName,
        customer_phone: customerPhone,
        status: 'جديد' // مهم عشان ما يخالف الـ CHECK
    }]);

    if (error) {
        alert('خطأ في إرسال الطلب: ' + error.message);
        console.log(error);
    } else {
        alert('تم إرسال الطلب بنجاح! صاحب المتجر بيتواصل معك');
        cart = [];
        updateCartCount();
        closeCart();
    }
}

document.getElementById('searchProduct').oninput = applyFilters;
document.getElementById('searchStore').oninput = applyFilters;
loadProducts();
</script>
</body>
</html>
