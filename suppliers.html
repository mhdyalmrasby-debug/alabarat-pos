<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الموردين - العَبَرات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
    .bg-navy { background-color: #0B2545; }.bg-gold { background-color: #F5B301; }
    .modal { background-color: rgba(0,0,0,0.8); }
  </style>
</head>
<body class="bg-gray-100">
  <div class="container mx-auto p-4 max-w-6xl">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-black text-navy">إدارة الموردين</h1>
      <div class="flex gap-3">
        <button onclick="openAddSupplier()" class="bg-gold text-navy px-4 py-2 rounded font-bold">+ مورد جديد</button>
        <a href="purchases.html" class="bg-blue-600 text-white px-4 py-2 rounded font-bold">المشتريات</a>
        <a href="dashboard.html" class="text-navy">← لوحة التحكم</a>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow p-4 mb-6">
      <input id="searchSupplier" type="text" oninput="filterSuppliers()" placeholder="🔍 ابحث عن مورد بالاسم أو الجوال..." class="w-full p-3 border-2 border-navy rounded-lg">
    </div>

    <div class="grid md:grid-cols-3 gap-4 mb-6">
      <div class="bg-white p-4 rounded-lg shadow">
        <div class="text-gray-500 text-sm">إجمالي المستحق علينا</div>
        <div id="totalPayable" class="text-2xl font-black text-red-600">0.00 ر.س</div>
      </div>
      <div class="bg-white p-4 rounded-lg shadow">
        <div class="text-gray-500 text-sm">إجمالي الدفعات المقدمة</div>
        <div id="totalAdvance" class="text-2xl font-black text-green-600">0.00 ر.س</div>
      </div>
      <div class="bg-white p-4 rounded-lg shadow">
        <div class="text-gray-500 text-sm">عدد الموردين</div>
        <div id="totalSuppliers" class="text-2xl font-black text-navy">0</div>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-100">
          <tr>
            <th class="p-3 text-right text-sm font-bold text-gray-700">الاسم</th>
            <th class="p-3 text-right text-sm font-bold text-gray-700">الجوال</th>
            <th class="p-3 text-right text-sm font-bold text-gray-700">الرقم الضريبي</th>
            <th class="p-3 text-right text-sm font-bold text-gray-700">الرصيد</th>
            <th class="p-3 text-right text-sm font-bold text-gray-700">إجراءات</th>
          </tr>
        </thead>
        <tbody id="suppliersTableBody">
          <tr><td colspan="5" class="text-center py-8 text-gray-500">جاري تحميل الموردين...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="addSupplierModal" class="modal fixed inset-0 hidden items-center justify-center z-50">
    <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-md">
      <h3 class="text-xl font-bold text-navy mb-4">إضافة مورد جديد</h3>
      <div class="space-y-3">
        <input id="s_name" type="text" placeholder="اسم المورد *" class="w-full p-2 border rounded">
        <input id="s_phone" type="text" placeholder="رقم الجوال" class="w-full p-2 border rounded">
        <input id="s_tax" type="text" placeholder="الرقم الضريبي" class="w-full p-2 border rounded">
        <input id="s_balance" type="number" step="0.01" placeholder="الرصيد الافتتاحي - سالب يعني لنا" class="w-full p-2 border rounded">
        <textarea id="s_address" placeholder="العنوان" class="w-full p-2 border rounded h-20"></textarea>
      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="saveSupplier()" class="flex-1 bg-navy text-white py-2 rounded font-bold">حفظ</button>
        <button onclick="closeAddSupplier()" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded font-bold">إلغاء</button>
      </div>
      <div id="addSupplierMsg" class="text-sm mt-2 text-center"></div>
    </div>
  </div>

  <div id="editSupplierModal" class="modal fixed inset-0 hidden items-center justify-center z-50">
    <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-md">
      <h3 class="text-xl font-bold text-navy mb-4">تعديل بيانات المورد</h3>
      <div class="space-y-3">
        <input id="edit_s_name" type="text" placeholder="اسم المورد *" class="w-full p-2 border rounded">
        <input id="edit_s_phone" type="text" placeholder="رقم الجوال" class="w-full p-2 border rounded">
        <input id="edit_s_tax" type="text" placeholder="الرقم الضريبي" class="w-full p-2 border rounded">
        <textarea id="edit_s_address" placeholder="العنوان" class="w-full p-2 border rounded h-20"></textarea>
      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="updateSupplier()" class="flex-1 bg-navy text-white py-2 rounded font-bold">تحديث</button>
        <button onclick="closeEditSupplier()" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded font-bold">إلغاء</button>
      </div>
      <div id="editSupplierMsg" class="text-sm mt-2 text-center"></div>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  const supabase = createClient('https://eeiegignudoedrlkuaqn.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlaWVnaWdudWRvZWRybGt1YXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODUwNzMsImV4cCI6MjA5MzA2MTA3M30.gtqh1KbGmXZ9VBkmpFCYtJetn1ZXPHcp5oX9sENBb2Q')

  let currentStore = null, allSuppliers = [], filteredSuppliers = [], editingSupplierId = null;

  async function init() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { window.location.href = 'alabarat.html'; return; }
    const { data: store } = await supabase.from('stores').select().eq('user_id', user.id).single();
    currentStore = store;
    await loadSuppliers();
  }

  async function loadSuppliers() {
    const { data: suppliers, error } = await supabase.from('suppliers').select().eq('store_id', currentStore.id).order('name');
    const tableBody = document.getElementById('suppliersTableBody');
    if (error) {
      tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-red-500">خطأ: ' + error.message + '</td></tr>';
      return;
    }
    allSuppliers = suppliers || [];
    filteredSuppliers = [...allSuppliers];
    updateStats();
    renderSuppliersTable();
  }

  function updateStats() {
    var totalPayable = 0, totalAdvance = 0;
    allSuppliers.forEach(function(s) {
      if (s.balance < 0) totalPayable += Math.abs(s.balance);
      if (s.balance > 0) totalAdvance += s.balance;
    });
    document.getElementById('totalPayable').textContent = totalPayable.toFixed(2) + ' ر.س';
    document.getElementById('totalAdvance').textContent = totalAdvance.toFixed(2) + ' ر.س';
    document.getElementById('totalSuppliers').textContent = allSuppliers.length;
  }

  function renderSuppliersTable() {
    const tableBody = document.getElementById('suppliersTableBody');
    if (filteredSuppliers.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-500">لا يوجد موردين</td></tr>';
        return;
    }
    tableBody.innerHTML = filteredSuppliers.map(function(s) {
        var balance = parseFloat(s.balance || 0);
        var balanceClass = balance < 0? 'text-red-600' : balance > 0? 'text-green-600' : 'text-gray-600';
        var balanceText = balance < 0? Math.abs(balance).toFixed(2) + ' عليه' : balance > 0? balance.toFixed(2) + ' له' : '0.00';
        return '<tr class="border-b hover:bg-gray-50">' +
            '<td class="p-3 font-bold">' + s.name + '</td>' +
            '<td class="p-3">' + (s.phone || '-') + '</td>' +
            '<td class="p-3">' + (s.tax_number || '-') + '</td>' +
            '<td class="p-3 font-bold ' + balanceClass + '">' + balanceText + '</td>' +
            '<td class="p-3">' +
                '<button onclick="viewStatement(' + s.id + ')" class="bg-purple-600 text-white px-3 py-1 rounded text-sm ml-1">كشف حساب</button>' +
                '<button onclick="editSupplier(' + s.id + ')" class="bg-blue-600 text-white px-3 py-1 rounded text-sm">تعديل</button>' +
            '</td>' +
        '</tr>';
    }).join('');
  }

  window.filterSuppliers = function() {
    const query = document.getElementById('searchSupplier').value.toLowerCase().trim();
    if (!query) {
      filteredSuppliers = [...allSuppliers];
    } else {
      filteredSuppliers = allSuppliers.filter(function(s) {
        return s.name.toLowerCase().includes(query) || (s.phone && s.phone.includes(query));
      });
    }
    renderSuppliersTable();
  }

  window.openAddSupplier = function() {
    document.getElementById('addSupplierModal').classList.remove('hidden');
    document.getElementById('addSupplierModal').classList.add('flex');
    document.getElementById('addSupplierMsg').textContent = '';
  }

  window.closeAddSupplier = function() {
    document.getElementById('addSupplierModal').classList.add('hidden');
    document.getElementById('addSupplierModal').classList.remove('flex');
  }

  window.saveSupplier = async function() {
    const name = document.getElementById('s_name').value.trim();
    const phone = document.getElementById('s_phone').value.trim();
    const tax = document.getElementById('s_tax').value.trim();
    const balance = parseFloat(document.getElementById('s_balance').value) || 0;
    const address = document.getElementById('s_address').value.trim();
    const msg = document.getElementById('addSupplierMsg');
    if (!name) {
      msg.textContent = 'اسم المورد مطلوب';
      msg.className = 'text-sm mt-2 text-center text-red-600';
      return;
    }
    const { error } = await supabase.from('suppliers').insert({
      store_id: currentStore.id,
      name: name,
      phone: phone || null,
      tax_number: tax || null,
      balance: balance,
      address: address || null
    });
    if (error) {
      msg.textContent = 'خطأ: ' + error.message;
      msg.className = 'text-sm mt-2 text-center text-red-600';
    } else {
      msg.textContent = 'تمت الإضافة ✅';
      msg.className = 'text-sm mt-2 text-center text-green-600';
      setTimeout(function() {
        closeAddSupplier();
        loadSuppliers();
        document.getElementById('s_name').value = '';
        document.getElementById('s_phone').value = '';
        document.getElementById('s_tax').value = '';
        document.getElementById('s_balance').value = '';
        document.getElementById('s_address').value = '';
      }, 1000);
    }
  }

  window.editSupplier = function(id) {
    const supplier = allSuppliers.find(function(s) { return s.id === id; });
    if (!supplier) return;
    editingSupplierId = id;
    document.getElementById('edit_s_name').value = supplier.name;
    document.getElementById('edit_s_phone').value = supplier.phone || '';
    document.getElementById('edit_s_tax').value = supplier.tax_number || '';
    document.getElementById('edit_s_address').value = supplier.address || '';
    document.getElementById('editSupplierModal').classList.remove('hidden');
    document.getElementById('editSupplierModal').classList.add('flex');
  }

  window.closeEditSupplier = function() {
    document.getElementById('editSupplierModal').classList.add('hidden');
    document.getElementById('editSupplierModal').classList.remove('flex');
    editingSupplierId = null;
  }

  window.updateSupplier = async function() {
    const name = document.getElementById('edit_s_name').value.trim();
    const phone = document.getElementById('edit_s_phone').value.trim();
    const tax = document.getElementById('edit_s_tax').value.trim();
    const address = document.getElementById('edit_s_address').value.trim();
    const msg = document.getElementById('editSupplierMsg');
    if (!name) {
      msg.textContent = 'اسم المورد مطلوب';
      msg.className = 'text-sm mt-2 text-center text-red-600';
      return;
    }
    const { error } = await supabase.from('suppliers').update({
      name: name,
      phone: phone || null,
      tax_number: tax || null,
      address: address || null
    }).eq('id', editingSupplierId);
    if (error) {
      msg.textContent = 'خطأ: ' + error.message;
      msg.className = 'text-sm mt-2 text-center text-red-600';
    } else {
      msg.textContent = 'تم التحديث ✅';
      msg.className = 'text-sm mt-2 text-center text-green-600';
      setTimeout(function() {
        closeEditSupplier();
        loadSuppliers();
      }, 1000);
    }
  }

  window.viewStatement = function(id) {
    alert('كشف حساب المورد قريباً - نخلص المشتريات أول');
  }

  init();
</script>
</body>
</html>
