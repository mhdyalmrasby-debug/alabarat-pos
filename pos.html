<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الكاشير - العَبَرات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
   .bg-navy { background-color: #0B2545; } .bg-gold { background-color: #F5B301; }
   .text-navy { color: #0B2545; } .text-gold { color: #F5B301; }
   .modal { background-color: rgba(0,0,0,0.8); }
    #reader { width: 100%; border: 3px solid #F5B301; border-radius: 8px; }
   .product-card:active { transform: scale(0.95); }
   .tab-active { background-color: #0B2545; color: white; }
   .order-new { animation: pulse 2s infinite; }
   @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  </style>
</head>
<body class="bg-gray-100">
  <!-- رسالة الخطأ -->
  <div id="errorBox" class="hidden bg-red-600 text-white p-4 text-center font-bold"></div>
  <!-- إشعار طلب جديد -->
  <div id="newOrderAlert" class="hidden fixed top-4 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-6 py-4 rounded-lg shadow-2xl z-50 font-bold text-lg">
    🔔 طلب جديد وصل!
  </div>

  <!-- التبويبات -->
  <div class="bg-navy text-white p-4 shadow-lg">
    <div class="container mx-auto flex justify-between items-center mb-3">
      <h1 class="text-2xl font-black">الكاشير - <span id="storeName"></span></h1>
      <a href="dashboard.html" class="text-sm text-gold">→ لوحة التحكم</a>
    </div>
    <div class="flex gap-2">
      <button onclick="switchTab('pos')" id="posTab" class="tab-active px-6 py-2 rounded-lg font-bold">نقطة البيع</button>
      <button onclick="switchTab('orders')" id="ordersTab" class="bg-white text-navy px-6 py-2 rounded-lg font-bold relative">
        الطلبات الجديدة
        <span id="ordersBadge" class="hidden absolute -top-2 -left-2 bg-red-500 text-white text-xs w-6 h-6 rounded-full flex items-center justify-center font-black">0</span>
      </button>
    </div>
  </div>

  <!-- تبويب نقطة البيع -->
  <div id="posContent" class="flex h-screen" style="height: calc(100vh - 120px);">
    <!-- الفاتورة -->
    <div class="w-2/5 bg-navy text-white p-4 flex flex-col">
      <h2 class="text-2xl font-bold mb-4">الفاتورة الحالية</h2>
      <div id="invoiceItems" class="flex-1 overflow-y-auto bg-white text-black rounded-lg p-3 space-y-2">
        <p class="text-center text-gray-400 mt-10">اختر منتجاً للبدء</p>
      </div>
      <div class="mt-4 space-y-2 text-lg">
        <div class="flex justify-between"><span>المجموع الفرعي:</span> <span id="subtotal">0.00 ر.س</span></div>
        <div class="flex justify-between"><span>ضريبة 15%:</span> <span id="tax">0.00 ر.س</span></div>
        <div class="flex justify-between text-2xl font-black border-t pt-2"><span>الإجمالي:</span> <span id="total">0.00 ر.س</span></div>
      </div>
      <div class="grid grid-cols-2 gap-2 mt-4">
        <button onclick="payCash()" class="bg-green-600 text-white py-3 rounded-lg font-bold col-span-2 text-xl">💵 دفع نقدي</button>
        <button onclick="payCredit()" class="bg-blue-600 text-white py-3 rounded-lg font-bold col-span-2">📝 بيع آجل</button>
      </div>
    </div>

    <!-- المنتجات -->
    <div class="w-3/5 p-4 flex flex-col">
      <div class="bg-white p-4 rounded-lg shadow mb-4">
        <div class="flex gap-3">
          <input id="searchBox" type="text" oninput="filterProducts()" placeholder="🔍 ابحث بالاسم أو الباركود..." class="flex-1 p-3 border-2 border-navy rounded-lg text-lg">
          <button onclick="openScanner()" class="bg-navy text-white px-6 rounded-lg font-bold">📷 مسح</button>
        </div>
      </div>
      <div id="productsGrid" class="flex-1 overflow-y-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
        <div class="col-span-full text-center text-gray-400 mt-10">جاري تحميل المنتجات...</div>
      </div>
    </div>
  </div>

  <!-- تبويب الطلبات الجديدة -->
  <div id="ordersContent" class="hidden p-6">
    <h2 class="text-3xl font-black text-navy mb-6">طلبات الزبائن الأونلاين</h2>
    <div id="ordersList" class="space-y-4">
      <div class="text-center text-gray-400 py-16">
        <div class="text-6xl mb-4">📦</div>
        <div class="text-xl font-bold">لا توجد طلبات جديدة</div>
      </div>
    </div>
  </div>

  <!-- مودال السكانر -->
  <div id="scannerModal" class="modal fixed inset-0 hidden items-center justify-center z-50">
    <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-lg">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold text-navy">امسح الباركود</h3>
        <button onclick="closeScanner()" class="text-2xl font-bold text-red-600">×</button>
      </div>
      <div id="reader"></div>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  const supabase = createClient('https://eeiegignudoedrlkuaqn.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlaWVnaWdudWRvZWRybGt1YXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODUwNzMsImV4cCI6MjA5MzA2MTA3M30.gtqh1KbGmXZ9VBkmpFCYtJetn1ZXPHcp5oX9sENBb2Q')

  let currentStore = null;
  let allProducts = [];
  let filteredProducts = [];
  let invoice = [];
  let html5QrCode = null;
  let newOrders = [];

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = 'خطأ: ' + msg;
    box.classList.remove('hidden');
  }

  function playNotificationSound() {
    const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGH0fPTgjMGHm7A7+OZURE');
    audio.play().catch(e => console.log('الصوت محظور'));
  }

  function showNewOrderAlert() {
    const alert = document.getElementById('newOrderAlert');
    alert.classList.remove('hidden');
    playNotificationSound();
    setTimeout(() => alert.classList.add('hidden'), 4000);
  }

  async function init() {
    try {
      const { data: { user }, error: userError } = await supabase.auth.getUser();
      if (userError || !user) {
        showError('لازم تسجل دخول أول');
        setTimeout(() => window.location.href = 'index.html', 2000);
        return;
      }

      const { data: store, error: storeError } = await supabase
     .from('stores')
     .select('id, store_name')
     .eq('user_id', user.id)
     .single();
     
      if (storeError || !store) {
        showError('ما لقيت متجر مرتبط بحسابك');
        return;
      }
      
      currentStore = store;
      document.getElementById('storeName').textContent = store.store_name;
      await loadProducts();
      await loadOrders();
      subscribeToNewOrders();
    } catch (e) {
      showError(e.message);
    }
  }

  function subscribeToNewOrders() {
    supabase
      .channel('orders-channel')
      .on('postgres_changes', { 
        event: 'INSERT', 
        schema: 'public', 
        table: 'orders',
        filter: `store_id=eq.${currentStore.id}`
      }, (payload) => {
        console.log('طلب جديد:', payload.new);
        showNewOrderAlert();
        loadOrders();
      })
      .subscribe();
  }

  window.switchTab = function(tab) {
    if (tab === 'pos') {
      document.getElementById('posContent').classList.remove('hidden');
      document.getElementById('ordersContent').classList.add('hidden');
      document.getElementById('posTab').classList.add('tab-active');
      document.getElementById('ordersTab').classList.remove('tab-active');
      document.getElementById('ordersTab').classList.add('bg-white', 'text-navy');
    } else {
      document.getElementById('posContent').classList.add('hidden');
      document.getElementById('ordersContent').classList.remove('hidden');
      document.getElementById('ordersTab').classList.add('tab-active');
      document.getElementById('posTab').classList.remove('tab-active');
      document.getElementById('posTab').classList.add('bg-white', 'text-navy');
      loadOrders();
    }
  }

  async function loadProducts() {
    const { data: products, error } = await supabase.from('products')
   .select('id, name, barcode, cost_price, sell_price, stock_qty')
   .eq('store_id', currentStore.id)
   .gt('stock_qty', 0)
   .order('name');

    if (error) {
      showError('خطأ في تحميل المنتجات: ' + error.message);
      return;
    }

    allProducts = products || [];
    filteredProducts = [...allProducts];
    renderProducts();
  }

  function renderProducts() {
    const grid = document.getElementById('productsGrid');
    if (filteredProducts.length === 0) {
      grid.innerHTML = '<div class="col-span-full text-center text-gray-400 mt-10">لا توجد نتائج</div>';
      return;
    }
    grid.innerHTML = filteredProducts.map(p => `
      <div onclick="addToInvoice('${p.id}')" class="product-card bg-white p-4 rounded-lg shadow cursor-pointer hover:shadow-xl transition">
        <div class="font-bold text-navy text-lg mb-1">${p.name}</div>
        <div class="text-sm text-gray-500 mb-2">${p.barcode || 'بدون باركود'}</div>
        <div class="flex justify-between items-end">
          <span class="text-2xl font-black text-green-600">${Number(p.sell_price).toFixed(2)}</span>
          <span class="text-sm bg-blue-100 text-blue-700 px-2 py-1 rounded">متوفر: ${p.stock_qty}</span>
        </div>
      </div>
    `).join('');
  }

  window.filterProducts = function() {
    const query = document.getElementById('searchBox').value.toLowerCase().trim();
    if (!query) {
      filteredProducts = [...allProducts];
    } else {
      filteredProducts = allProducts.filter(p => 
        p.name.toLowerCase().includes(query) || 
        (p.barcode && p.barcode.toLowerCase().includes(query))
      );
    }
    renderProducts();
  }

  window.addToInvoice = function(productId) {
    const product = allProducts.find(p => p.id === productId);
    const existing = invoice.find(i => i.id === productId);
    if (existing) {
      if (existing.qty < product.stock_qty) existing.qty++;
      else return alert('الكمية المتوفرة لا تكفي');
    } else {
      invoice.push({ ...product, qty: 1 });
    }
    renderInvoice();
  }

  function renderInvoice() {
    const container = document.getElementById('invoiceItems');
    if (invoice.length === 0) {
      container.innerHTML = '<p class="text-center text-gray-400 mt-10">اختر منتجاً للبدء</p>';
    } else {
      container.innerHTML = invoice.map(item => `
        <div class="flex justify-between items-center bg-gray-50 p-2 rounded">
          <div class="flex-1">
            <div class="font-bold">${item.name}</div>
            <div class="text-sm text-gray-600">${Number(item.sell_price).toFixed(2)} × ${item.qty}</div>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="updateQty('${item.id}', -1)" class="bg-red-500 text-white w-8 h-8 rounded font-bold">-</button>
            <span class="w-8 text-center font-bold">${item.qty}</span>
            <button onclick="updateQty('${item.id}', 1)" class="bg-green-500 text-white w-8 h-8 rounded font-bold">+</button>
            <button onclick="removeItem('${item.id}')" class="text-red-600 mr-2">🗑️</button>
          </div>
        </div>
      `).join('');
    }
    calculateTotal();
  }

  window.updateQty = function(id, change) {
    const item = invoice.find(i => i.id === id);
    const product = allProducts.find(p => p.id === id);
    if (change > 0 && item.qty >= product.stock_qty) return alert('الكمية المتوفرة لا تكفي');
    item.qty += change;
    if (item.qty <= 0) removeItem(id);
    renderInvoice();
  }

  window.removeItem = function(id) {
    invoice = invoice.filter(i => i.id !== id);
    renderInvoice();
  }

  function calculateTotal() {
    const subtotal = invoice.reduce((sum, item) => sum + (item.sell_price * item.qty), 0);
    const tax = subtotal * 0.15;
    const total = subtotal + tax;
    document.getElementById('subtotal').textContent = subtotal.toFixed(2) + ' ر.س';
    document.getElementById('tax').textContent = tax.toFixed(2) + ' ر.س';
    document.getElementById('total').textContent = total.toFixed(2) + ' ر.س';
  }

  window.payCash = async function() {
    if (invoice.length === 0) return alert('الفاتورة فارغة');
    await completeSale('cash');
  }

  window.payCredit = async function() {
    if (invoice.length === 0) return alert('الفاتورة فارغة');
    const customerName = prompt('اسم العميل:');
    if (!customerName) return;
    await completeSale('credit', customerName);
  }

  async function completeSale(paymentType, customerName = null) {
    const subtotal = invoice.reduce((sum, item) => sum + (item.sell_price * item.qty), 0);
    const tax = subtotal * 0.15;
    const total = subtotal + tax;

    const { data: sale, error } = await supabase.from('sales').insert({
      store_id: currentStore.id,
      total_amount: total,
      payment_type: paymentType,
      customer_name: customerName
    }).select().single();

    if (error) return alert('خطأ: ' + error.message);

    for (const item of invoice) {
      await supabase.from('sale_items').insert({
        sale_id: sale.id,
        product_id: item.id,
        quantity: item.qty,
        price_at_sale: item.sell_price,
        cost_price: item.cost_price
      });
      await supabase.from('products').update({ stock_qty: item.stock_qty - item.qty }).eq('id', item.id);
    }

    alert('تمت العملية بنجاح ✅ فاتورة رقم: ' + sale.id.substring(0,8));
    invoice = [];
    renderInvoice();
    await loadProducts();
  }

  async function loadOrders() {
    const { data: orders, error } = await supabase
      .from('orders')
      .select('*')
      .eq('store_id', currentStore.id)
      .eq('status', 'جديد')
      .order('created_at', { ascending: false });

    if (error) {
      console.error('خطأ في تحميل الطلبات:', error);
      return;
    }

    newOrders = orders || [];
    const badge = document.getElementById('ordersBadge');
    if (newOrders.length > 0) {
      badge.textContent = newOrders.length;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }

    renderOrders();
  }

  function renderOrders() {
    const container = document.getElementById('ordersList');
    if (newOrders.length === 0) {
      container.innerHTML = `
        <div class="text-center text-gray-400 py-16">
          <div class="text-6xl mb-4">📦</div>
          <div class="text-xl font-bold">لا توجد طلبات جديدة</div>
        </div>`;
      return;
    }

    container.innerHTML = newOrders.map(order => `
      <div class="order-new bg-white rounded-xl shadow-lg p-6 border-2 border-gold">
        <div class="flex justify-between items-start mb-4">
          <div>
            <div class="text-2xl font-black text-navy">طلب #${order.id.substring(0,8)}</div>
            <div class="text-sm text-gray-500">${new Date(order.created_at).toLocaleString('ar-SA')}</div>
          </div>
          <span class="bg-green-500 text-white px-4 py-2 rounded-full font-bold">جديد</span>
        </div>
        
        <div class="grid md:grid-cols-2 gap-4 mb-4">
          <div>
            <div class="text-sm text-gray-500">العميل</div>
            <div class="font-bold text-lg">${order.customer_name}</div>
          </div>
          <div>
            <div class="text-sm text-gray-500">الجوال</div>
            <div class="font-bold text-lg">${order.customer_phone}</div>
          </div>
          <div class="md:col-span-2">
            <div class="text-sm text-gray-500">العنوان</div>
            <div class="font-bold">${order.customer_address}</div>
          </div>
          ${order.notes ? `
          <div class="md:col-span-2">
            <div class="text-sm text-gray-500">ملاحظات</div>
            <div class="text-gray-700">${order.notes}</div>
          </div>` : ''}
        </div>

        <div class="bg-gray-50 rounded-lg p-4 mb-4">
          <div class="font-bold text-navy mb-2">المنتجات:</div>
          ${order.items.map(item => `
            <div class="flex justify-between text-sm py-1">
              <span>${item.name} × ${item.qty}</span>
              <span class="font-bold">${(item.price * item.qty).toFixed(2)} ر.س</span>
            </div>
          `).join('')}
          <div class="border-t mt-2 pt-2 flex justify-between text-xl font-black">
            <span>الإجمالي:</span>
            <span class="text-green-600">${Number(order.total_amount).toFixed(2)} ر.س</span>
          </div>
        </div>

        <div class="flex gap-3">
          <button onclick="completeOrder('${order.id}')" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold text-lg hover:bg-green-700">
            ✅ تم التجهيز والتوصيل
          </button>
          <button onclick="rejectOrder('${order.id}')" class="bg-red-500 text-white px-6 py-3 rounded-lg font-bold hover:bg-red-600">
            ❌ رفض
          </button>
        </div>
      </div>
    `).join('');
  }

  window.completeOrder = async function(orderId) {
    if (!confirm('تأكيد إن الطلب جاهز وتم توصيله؟')) return;
    
    const order = newOrders.find(o => o.id === orderId);
    
    const { data: sale, error: saleError } = await supabase.from('sales').insert({
      store_id: currentStore.id,
      total_amount: order.total_amount,
      payment_type: 'online',
      customer_name: order.customer_name
    }).select().single();

    if (saleError) {
      alert('خطأ في إنشاء المبيعة: ' + saleError.message);
      return;
    }

    for (const item of order.items) {
      const product = allProducts.find(p => p.id === item.id);
      await supabase.from('sale_items').insert({
        sale_id: sale.id,
        product_id: item.id,
        quantity: item.qty,
        price_at_sale: item.price,
        cost_price: product?.cost_price || 0
      });
      
      if (product) {
        await supabase.from('products').update({ 
          stock_qty: product.stock_qty - item.qty 
        }).eq('id', item.id);
      }
    }

    await supabase.from('orders').update({ status: 'مكتمل' }).eq('id', orderId);

    alert('تم ختم الطلب وتسجيله في المبيعات ✅');
    await loadOrders();
    await loadProducts();
  }

  window.rejectOrder = async function(orderId) {
    if (!confirm('متأكد تبي ترفض الطلب؟')) return;
    await supabase.from('orders').update({ status: 'ملغي' }).eq('id', orderId);
    await loadOrders();
  }

  window.openScanner = function() {
    document.getElementById('scannerModal').classList.remove('hidden');
    document.getElementById('scannerModal').classList.add('flex');
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
      const product = allProducts.find(p => p.barcode === decodedText);
      if (product) addToInvoice(product.id);
      setTimeout(closeScanner, 1500);
    });
  }

  window.closeScanner = function() {
    if (html5QrCode) html5QrCode.stop();
    document.getElementById('scannerModal').classList.add('hidden');
  }

  init();
</script>
</body>
</html>
