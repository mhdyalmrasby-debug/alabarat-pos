<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العبرات - تسجيل الدخول</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-indigo-600 rounded-xl flex items-center justify-center mx-auto mb-4">
                <span class="text-white text-2xl font-bold">ع</span>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">العبرات</h1>
            <p class="text-gray-500 mt-2">سجل دخولك للمتابعة</p>
        </div>

        <div class="flex mb-6 bg-gray-100 rounded-lg p-1">
            <button id="loginTab" class="flex-1 py-2 rounded-md bg-white shadow-sm font-semibold text-indigo-600">دخول</button>
            <button id="signupTab" class="flex-1 py-2 rounded-md font-semibold text-gray-500">إنشاء حساب</button>
        </div>

        <div id="message" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">البريد الإلكتروني</label>
                <input type="email" id="loginEmail" required class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">كلمة المرور</label>
                <input type="password" id="loginPassword" required class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700">
                تسجيل الدخول
            </button>
        </form>

        <form id="signupForm" class="hidden">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">البريد الإلكتروني</label>
                <input type="email" id="signupEmail" required class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">كلمة المرور</label>
                <input type="password" id="signupPassword" required minlength="6" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700">
                إنشاء حساب
            </button>
        </form>

        <!-- فاصل -->
        <div class="flex items-center my-6">
            <div class="flex-1 border-t border-gray-300"></div>
            <span class="px-4 text-gray-500 text-sm">أو</span>
            <div class="flex-1 border-t border-gray-300"></div>
        </div>

        <!-- زر التسوق -->
        <a href="store.html" class="block w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 text-center">
            🛍️ دخول كزائر للتسوق
        </a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const SUPABASE_URL = 'https://jgekcfwacinmxkylrdpm.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnZWtjZndhY2lubXhreWxyZHBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTQxNTYsImV4cCI6MjA5NDI3MDE1Nn0._RA5UoWuUyPM0G4aGd9m2LOcsaEiMan2-Lvx60Cnf4Y';
            
            const { createClient } = supabase;
            const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const messageDiv = document.getElementById('message');

            document.getElementById('loginTab').onclick = () => {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                hideMessage();
            };

            document.getElementById('signupTab').onclick = () => {
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                hideMessage();
            };

            loginForm.onsubmit = async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;
                
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                
                if (error) {
                    showMessage(error.message, 'error');
                } else {
                    showMessage('تم تسجيل الدخول بنجاح!', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                }
            };

            signupForm.onsubmit = async (e) => {
                e.preventDefault();
                const email = document.getElementById('signupEmail').value.trim();
                const password = document.getElementById('signupPassword').value;
                
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                console.log('Signup Response:', { data, error });
                
                if (error) showMessage(error.message, 'error');
                else showMessage('تم إنشاء الحساب! ' + (data.user?.identities?.length === 0 ? 'الإيميل موجود مسبقاً' : 'تفقد بريدك للتأكيد'), 'success');
            };

            function showMessage(msg, type) {
                messageDiv.classList.remove('hidden');
                messageDiv.textContent = msg;
                messageDiv.className = `mb-4 p-3 rounded-lg text-sm ${
                    type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'
                }`;
            }

            function hideMessage() {
                messageDiv.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
