<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دخول - العَبَرات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
    .bg-navy { background-color: #0B2545; }
    .bg-gold { background-color: #F5B301; }
    .text-navy { color: #0B2545; }
    .tab-active { border-bottom: 3px solid #F5B301; }
  </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-black text-navy">العَبَرات</h1>
      <p class="text-gray-500">نظام إدارة المتاجر السحابي</p>
    </div>

    <!-- التبويبات -->
    <div class="flex mb-6 border-b">
      <button id="loginTab" onclick="showTab('login')" class="flex-1 py-2 font-bold tab-active">دخول</button>
      <button id="signupTab" onclick="showTab('signup')" class="flex-1 py-2 font-bold text-gray-400">حساب جديد</button>
      <button id="resetTab" onclick="showTab('reset')" class="flex-1 py-2 font-bold text-gray-400">نسيت كلمة السر</button>
    </div>

    <!-- تسجيل الدخول -->
    <div id="loginForm">
      <input id="loginEmail" type="email" placeholder="البريد الإلكتروني" class="w-full p-3 mb-3 border-2 border-gray-200 rounded-lg focus:border-gold">
      <input id="loginPassword" type="password" placeholder="كلمة المرور" class="w-full p-3 mb-4 border-2 border-gray-200 rounded-lg focus:border-gold">
      <button onclick="login()" class="w-full bg-navy text-white p-3 rounded-lg font-bold mb-2">دخول</button>
    </div>

    <!-- إنشاء حساب -->
    <div id="signupForm" class="hidden">
      <input id="signupEmail" type="email" placeholder="البريد الإلكتروني" class="w-full p-3 mb-3 border-2 border-gray-200 rounded-lg focus:border-gold">
      <input id="signupPassword" type="password" placeholder="كلمة المرور 6 أحرف على الأقل" class="w-full p-3 mb-3 border-2 border-gray-200 rounded-lg focus:border-gold">
      <input id="storeName" type="text" placeholder="اسم المتجر" class="w-full p-3 mb-3 border-2 border-gray-200 rounded-lg focus:border-gold">
      <input id="phone" type="text" placeholder="رقم الجوال 05xxxxxxxx" class="w-full p-3 mb-4 border-2 border-gray-200 rounded-lg focus:border-gold">
      <button onclick="signup()" class="w-full bg-gold text-navy p-3 rounded-lg font-bold">إنشاء حساب</button>
    </div>

    <!-- استعادة كلمة السر -->
    <div id="resetForm" class="hidden">
      <p class="text-sm text-gray-600 mb-3">ندز لك رابط تغيير كلمة السر على إيميلك</p>
      <input id="resetEmail" type="email" placeholder="البريد الإلكتروني" class="w-full p-3 mb-4 border-2 border-gray-200 rounded-lg focus:border-gold">
      <button onclick="resetPassword()" class="w-full bg-gray-600 text-white p-3 rounded-lg font-bold">إرسال الرابط</button>
    </div>

    <div id="msg" class="text-center mt-4 text-sm font-bold"></div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  const supabase = createClient('https://eeiegignudoedrlkuaqn.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlaWVnaWdudWRvZWRybGt1YXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODUwNzMsImV4cCI6MjA5MzA2MTA3M30.gtqh1KbGmXZ9VBkmpFCYtJetn1ZXPHcp5oX9sENBb2Q')

  window.showTab = function(tab) {
    ['login', 'signup', 'reset'].forEach(t => {
      document.getElementById(t + 'Form').classList.add('hidden');
      document.getElementById(t + 'Tab').classList.remove('tab-active');
      document.getElementById(t + 'Tab').classList.add('text-gray-400');
    });
    document.getElementById(tab + 'Form').classList.remove('hidden');
    document.getElementById(tab + 'Tab').classList.add('tab-active');
    document.getElementById(tab + 'Tab').classList.remove('text-gray-400');
    document.getElementById('msg').textContent = '';
  }

  function showMsg(text, isError = true) {
    const msg = document.getElementById('msg');
    msg.textContent = text;
    msg.className = `text-center mt-4 text-sm font-bold ${isError ? 'text-red-600' : 'text-green-600'}`;
  }

  window.login = async function() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return showMsg('عبي الإيميل والباسوورد');
    
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) showMsg('خطأ: ' + error.message);
    else {
      showMsg('تم الدخول بنجاح...', false);
      setTimeout(() => window.location.href = 'dashboard.html', 800);
    }
  }

  window.signup = async function() {
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const storeName = document.getElementById('storeName').value;
    const phone = document.getElementById('phone').value;

    if (!email || !password || !storeName || !phone) return showMsg('عبي كل الحقول');
    if (password.length < 6) return showMsg('كلمة المرور لازم 6 أحرف على الأقل');

    const { data: authData, error: authError } = await supabase.auth.signUp({ email, password });
    if (authError) return showMsg('خطأ: ' + authError.message);

    const { error: storeError } = await supabase.from('stores').insert({
      user_id: authData.user.id,
      store_name: storeName,
      phone: phone
    });

    if (storeError) showMsg('خطأ في إنشاء المتجر: ' + storeError.message);
    else {
      showMsg('تم إنشاء الحساب ✅ ادخل الآن', false);
      setTimeout(() => showTab('login'), 1500);
    }
  }

  window.resetPassword = async function() {
    const email = document.getElementById('resetEmail').value;
    if (!email) return showMsg('اكتب إيميلك');
    
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://statuesque-creponne-1fce71.netlify.app/update-password.html'
    });
    
    if (error) showMsg('خطأ: ' + error.message);
    else showMsg('تم إرسال رابط التغيير على إيميلك 📧', false);
  }

  // لو مسجل دخول روح للوحة التحكم
  const { data: { user } } = await supabase.auth.getUser();
  if (user) window.location.href = 'dashboard.html';
</script>
</body>
</html>
