<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Mahdi POS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  .bg-navy { background-color: #0B2545; }
  .bg-gold { background-color: #F5B301; }
  .text-navy { color: #0B2545; }
  </style>
</head>
<body class="bg-gray-100">
  <!-- Development Banner -->
  <div class="bg-yellow-400 text-navy text-center py-2 text-sm font-bold">
    ⚠️ Project Under Development - Live Demo Version 1.0
  </div>

  <div class="bg-navy text-white p-4">
    <div class="container mx-auto flex justify-between items-center flex-wrap gap-3">
      <h1 class="text-2xl font-black">Products Management</h1>
      <div class="flex gap-3 flex-wrap items-center">
        <span id="userEmail" class="text-sm text-white/70"></span>
        <a href="dashboard.html" class="bg-white/20 px-4 py-2 rounded hover:bg-white/30">Dashboard</a>
        <a href="pos.html" class="bg-gold text-navy px-4 py-2 rounded font-bold hover:opacity-90">POS</a>
        <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded font-bold hover:bg-red-700">Logout</button>
      </div>
    </div>
  </div>

  <div class="container mx-auto p-6">
    <!-- Add Product Form -->
    <div class="bg-white p-6 rounded-lg shadow mb-6">
      <h2 class="text-xl font-bold text-navy mb-4">Add New Product</h2>
      <form id="addProductForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <input type="text" id="name" placeholder="Product Name" class="border p-3 rounded" required>
        <input type="text" id="barcode" placeholder="Barcode" class="border p-3 rounded">
        <input type="number" id="price" placeholder="Sell Price" step="0.01" class="border p-3 rounded" required>
        <input type="number" id="cost_price" placeholder="Cost Price" step="0.01" class="border p-3 rounded" required>
        <input type="number" id="stock_qty" placeholder="Stock Quantity" class="border p-3 rounded" required>
        <input type="date" id="expiry_date" placeholder="Expiry Date" class="border p-3 rounded">
        <button type="submit" class="bg-gold text-navy px-6 py-3 rounded font-bold md:col-span-3 hover:opacity-90">
          Add Product
        </button>
      </form>
    </div>

    <!-- Products Table -->
    <div class="bg-white p-6 rounded-lg shadow">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold text-navy">Products List</h2>
        <input type="text" id="search" placeholder="Search products..." class="border p-2 rounded w-64">
      </div>
      
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50">
            <tr>
              <th class="p-3 text-left">Name</th>
              <th class="p-3 text-left">Barcode</th>
              <th class="p-3 text-left">Price</th>
              <th class="p-3 text-left">Cost</th>
              <th class="p-3 text-left">Stock</th>
              <th class="p-3 text-left">Expiry</th>
              <th class="p-3 text-left">Actions</th>
            </tr>
          </thead>
          <tbody id="productsTable"></tbody>
        </table>
      </div>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  const supabase = createClient('https://eeiegignudoedrlkuaqn.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlaWVnaWdudWRvZWRybGt1YXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODUwNzMsImV4cCI6MjA5MzA2MTA3M30.gtqh1KbGmXZ9VBkmpFCYtJetn1ZXPHcp5oX9sENBb2Q')

  let currentStore = null;
  let allProducts = [];

  async function init() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { window.location.href = 'index.html'; return; }
    
    document.getElementById('userEmail').textContent = user.email;
    
    const { data: store } = await supabase.from('stores').select().eq('user_id', user.id).single();
    currentStore = store;
    
    await loadProducts();
    
    document.getElementById('addProductForm').addEventListener('submit', addProduct);
    document.getElementById('search').addEventListener('input', filterProducts);
  }

  async function loadProducts() {
    const { data: products } = await supabase
      .from('products')
      .select()
      .eq('store_id', currentStore.id)
      .order('created_at', { ascending: false });
    
    allProducts = products || [];
    renderProducts(allProducts);
  }

  function renderProducts(products) {
    const tbody = document.getElementById('productsTable');
    const today = new Date();
    
    tbody.innerHTML = products.map(p => {
      const expDate = p.expiry_date ? new Date(p.expiry_date) : null;
      const isExpired = expDate && expDate < today;
      const isLowStock = Number(p.stock_qty) <= 5;
      
      return `
        <tr class="border-b hover:bg-gray-50">
          <td class="p-3 font-bold">${p.name}</td>
          <td class="p-3 text-gray-600">${p.barcode || '-'}</td>
          <td class="p-3">${Number(p.price).toFixed(2)} SAR</td>
          <td class="p-3">${Number(p.cost_price).toFixed(2)} SAR</td>
          <td class="p-3 ${isLowStock ? 'text-red-600 font-bold' : ''}">${p.stock_qty}</td>
          <td class="p-3 ${isExpired ? 'text-red-600 font-bold' : ''}">${p.expiry_date || '-'}</td>
          <td class="p-3">
            <button onclick="deleteProduct('${p.id}')" class="text-red-600 hover:underline">Delete</button>
          </td>
        </tr>
      `;
    }).join('');
  }

  async function addProduct(e) {
    e.preventDefault();
    const form = e.target;
    
    const product = {
      store_id: currentStore.id,
      name: form.name.value,
      barcode: form.barcode.value || null,
      price: parseFloat(form.price.value),
      cost_price: parseFloat(form.cost_price.value),
      stock_qty: parseInt(form.stock_qty.value),
      expiry_date: form.expiry_date.value || null
    };

    const { error } = await supabase.from('products').insert(product);
    
    if (error) {
      alert('Error: ' + error.message);
    } else {
      form.reset();
      await loadProducts();
    }
  }

  function filterProducts() {
    const query = document.getElementById('search').value.toLowerCase();
    const filtered = allProducts.filter(p => 
      p.name.toLowerCase().includes(query) || 
      (p.barcode && p.barcode.includes(query))
    );
    renderProducts(filtered);
  }

  window.deleteProduct = async function(id) {
    if (!confirm('Delete this product?')) return;
    await supabase.from('products').delete().eq('id', id);
    await loadProducts();
  }

  window.logout = async function() {
    await supabase.auth.signOut();
    window.location.href = 'index.html';
  }

  init();
</script>
</body>
</html>
