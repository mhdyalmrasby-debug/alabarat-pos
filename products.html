<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العبرات - إدارة المنتجات</title>
    <link rel="icon" href="data:,">
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-6xl mx-auto p-6">
        
        <!-- الهيدر مع زر الرجوع -->
        <div class="bg-white rounded-xl shadow p-6 mb-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold">إدارة المنتجات</h1>
                    <p class="text-gray-500 text-sm">مرحباً <span id="userEmail"></span></p>
                </div>
                <div class="flex gap-3">
                    <a href="dashboard.html" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700">
                        ← الرجوع للوحة التحكم
                    </a>
                    <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">
                        تسجيل خروج
                    </button>
                </div>
            </div>
        </div>

        <!-- تنبيهات -->
        <div id="alertsContainer"></div>

        <!-- الإحصائيات -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow p-5">
                <p class="text-gray-500 text-sm">إجمالي المنتجات</p>
                <p id="totalProducts" class="text-3xl font-bold text-indigo-600">0</p>
            </div>
            <div class="bg-white rounded-xl shadow p-5">
                <p class="text-gray-500 text-sm">إجمالي الكمية</p>
                <p id="totalQty" class="text-3xl font-bold text-purple-600">0</p>
            </div>
            <div class="bg-white rounded-xl shadow p-5">
                <p class="text-gray-500 text-sm">إجمالي المبيعات المتوقعة</p>
                <p id="totalValue" class="text-3xl font-bold text-green-600">0 ريال</p>
            </div>
            <div class="bg-white rounded-xl shadow p-5">
                <p class="text-gray-500 text-sm">إجمالي التكلفة</p>
                <p id="totalCost" class="text-3xl font-bold text-red-600">0 ريال</p>
            </div>
            <div class="bg-white rounded-xl shadow p-5">
                <p class="text-gray-500 text-sm">قريبة الانتهاء</p>
                <p id="expiringSoon" class="text-3xl font-bold text-orange-600">0</p>
            </div>
        </div>

        <!-- فورم إضافة منتج -->
        <div class="bg-white rounded-xl shadow p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">إضافة منتج جديد</h2>
            <div id="message" class="hidden mb-4 p-3 rounded-lg text-sm"></div>
            
            <form id="addProductForm">
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                    <input type="text" id="productName" placeholder="اسم المنتج" required class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                    <input type="number" id="productPrice" placeholder="سعر البيع" required step="0.01" min="0" class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                    <input type="number" id="productCost" placeholder="سعر الشراء" step="0.01" min="0" value="0" class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                    <input type="number" id="productQty" placeholder="الكمية" min="0" value="1" class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                    <input type="text" id="productBarcode" placeholder="الباركود" class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                    <input type="date" id="productExpiry" class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                    <textarea id="productDesc" placeholder="الوصف" rows="1" class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500"></textarea>
                </div>
                <button type="submit" class="mt-4 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">إضافة المنتج</button>
            </form>
        </div>

        <!-- شريط البحث والفلترة والتصدير -->
        <div class="bg-white rounded-xl shadow p-4 mb-6">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="searchInput" placeholder="ابحث عن منتج أو باركود..." class="flex-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                <select id="filterSelect" class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                    <option value="all">كل المنتجات</option>
                    <option value="expiring">قريبة الانتهاء</option>
                    <option value="expired">منتهية</option>
                    <option value="valid">صالحة</option>
                    <option value="outofstock">نفدت الكمية</option>
                </select>
                <button onclick="exportToExcel()" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700">
                    تصدير Excel
                </button>
            </div>
        </div>

        <!-- قائمة المنتجات -->
        <div class="bg-white rounded-xl shadow p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">منتجاتك</h2>
                <span id="productCount" class="text-sm text-gray-500">0 منتج</span>
            </div>
            <div id="productsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
        </div>
    </div>

    <!-- مودال التعديل -->
    <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl max-w-md w-full p-6">
            <h3 class="text-xl font-bold mb-4">تعديل المنتج</h3>
            <form id="editProductForm">
                <input type="hidden" id="editProductId">
                <div class="space-y-3">
                    <input type="text" id="editProductName" required class="w-full px-4 py-2 border rounded-lg" placeholder="اسم المنتج">
                    <input type="number" id="editProductPrice" required step="0.01" class="w-full px-4 py-2 border rounded-lg" placeholder="سعر البيع">
                    <input type="number" id="editProductCost" step="0.01" class="w-full px-4 py-2 border rounded-lg" placeholder="سعر الشراء">
                    <input type="number" id="editProductQty" min="0" class="w-full px-4 py-2 border rounded-lg" placeholder="الكمية">
                    <input type="text" id="editProductBarcode" class="w-full px-4 py-2 border rounded-lg" placeholder="الباركود">
                    <input type="date" id="editProductExpiry" class="w-full px-4 py-2 border rounded-lg">
                    <textarea id="editProductDesc" rows="2" class="w-full px-4 py-2 border rounded-lg" placeholder="الوصف"></textarea>
                </div>
                <div class="flex gap-3 mt-6">
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">حفظ</button>
                    <button type="button" onclick="closeEditModal()" class="flex-1 bg-gray-200 py-2 rounded-lg hover:bg-gray-300">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jgekcfwacinmxkylrdpm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnZWtjZndhY2lubXhreWxyZHBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTQxNTYsImV4cCI6MjA5NDI3MDE1Nn0._RA5UoWuUyPM0G4aGd9m2LOcsaEiMan2-Lvx60Cnf4Y';
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let allProducts = [];
        let filteredProducts = [];
        const messageDiv = document.getElementById('message');

        // تحقق من المستخدم
        supabaseClient.auth.getUser().then(({ data: { user } }) => {
            if (!user) window.location.href = 'index.html';
            else {
                currentUser = user;
                document.getElementById('userEmail').textContent = user.email;
                loadProducts();
            }
        });

        document.getElementById('addProductForm').onsubmit = async (e) => {
    e.preventDefault();

    const barcodeVal = document.getElementById('productBarcode').value.trim();

    const { error } = await supabaseClient.from('products').insert([{
        user_id: currentUser.id,
        name: document.getElementById('productName').value,
        price: document.getElementById('productPrice').value ? parseFloat(document.getElementById('productPrice').value) : null,
        cost_price: document.getElementById('productCost').value ? parseFloat(document.getElementById('productCost').value) : 0,
        quantity: document.getElementById('productQty').value ? parseInt(document.getElementById('productQty').value) : 1,
        barcode: barcodeVal ? barcodeVal : null,  // هنا التعديل
        description: document.getElementById('productDesc').value || null,
        expiry_date: document.getElementById('productExpiry').value || null
    }]);

    if (error) {
        console.log(error);
        if (error.code === '23505') {
            showMessage('هذا الباركود مستخدم من قبل، استخدم باركود ثاني', 'error');
        } else {
            showMessage(error.message, 'error');
        }
    } else {
        showMessage('تم إضافة المنتج بنجاح!', 'success');
        document.getElementById('addProductForm').reset();
        loadProducts();
    }
};

        // تحميل المنتجات
        async function loadProducts() {
            const { data, error } = await supabaseClient
                .from('products')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });

            if (error) {
                document.getElementById('productsList').innerHTML = '<p class="text-red-500">خطأ في التحميل</p>';
                return;
            }

            allProducts = data;
            filteredProducts = data;
            updateStats();
            showAlerts();
            renderProducts();
        }

        // تحديث الإحصائيات
        function updateStats() {
            const total = allProducts.length;
            const totalQty = allProducts.reduce((sum, p) => sum + parseInt(p.quantity || 0), 0);
            const totalValue = allProducts.reduce((sum, p) => sum + (parseFloat(p.price || 0) * parseInt(p.quantity || 0)), 0);
            const totalCost = allProducts.reduce((sum, p) => sum + (parseFloat(p.cost_price || 0) * parseInt(p.quantity || 0)), 0);
            const today = new Date();
            const expiringSoon = allProducts.filter(p => {
                if (!p.expiry_date) return false;
                const diffDays = (new Date(p.expiry_date) - today) / (1000 * 60 * 60 * 24);
                return diffDays >= 0 && diffDays <= 10;
            }).length;

            document.getElementById('totalProducts').textContent = total;
            document.getElementById('totalQty').textContent = totalQty;
            document.getElementById('totalValue').textContent = totalValue.toFixed(2) + ' ريال';
            document.getElementById('totalCost').textContent = totalCost.toFixed(2) + ' ريال';
            document.getElementById('expiringSoon').textContent = expiringSoon;
        }

        // عرض التنبيهات
        function showAlerts() {
            const alertsContainer = document.getElementById('alertsContainer');
            const today = new Date();
            const expiring = allProducts.filter(p => {
                if (!p.expiry_date) return false;
                const diffDays = (new Date(p.expiry_date) - today) / (1000 * 60 * 60 * 24);
                return diffDays >= 0 && diffDays <= 10;
            });

            const outOfStock = allProducts.filter(p => (p.quantity || 0) === 0);

            let alertsHtml = '';
            if (expiring.length > 0) {
                alertsHtml += `
                <div class="bg-orange-50 border-orange-200 rounded-xl p-4 mb-4">
                    <div class="flex items-start gap-3">
                        <svg class="w-6 h-6 text-orange-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01"></path>
                        </svg>
                        <div>
                            <h3 class="font-bold text-orange-800">تنبيه: منتجات قريبة الانتهاء</h3>
                            <p class="text-orange-700 text-sm mt-1">لديك ${expiring.length} منتج ينتهي خلال 10 أيام</p>
                        </div>
                    </div>
                </div>`;
            }
            if (outOfStock.length > 0) {
                alertsHtml += `
                <div class="bg-red-50 border-red-200 rounded-xl p-4 mb-4">
                    <div class="flex items-start gap-3">
                        <svg class="w-6 h-6 text-red-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <div>
                            <h3 class="font-bold text-red-800">تنبيه: منتجات نفدت الكمية</h3>
                            <p class="text-red-700 text-sm mt-1">لديك ${outOfStock.length} منتج الكمية صفر</p>
                        </div>
                    </div>
                </div>`;
            }
            alertsContainer.innerHTML = alertsHtml;
        }

        // البحث والفلترة
        document.getElementById('searchInput').oninput = applyFilters;
        document.getElementById('filterSelect').onchange = applyFilters;

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterType = document.getElementById('filterSelect').value;
            const today = new Date();

            filteredProducts = allProducts.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(searchTerm) || 
                                     (p.description && p.description.toLowerCase().includes(searchTerm)) ||
                                     (p.barcode && p.barcode.toLowerCase().includes(searchTerm));
                
                if (!matchesSearch) return false;

                if (filterType === 'all') return true;
                if (filterType === 'outofstock') return (p.quantity || 0) === 0;
                if (!p.expiry_date) return filterType === 'valid';
                
                const diffDays = (new Date(p.expiry_date) - today) / (1000 * 60 * 60 * 24);
                if (filterType === 'expired') return diffDays < 0;
                if (filterType === 'expiring') return diffDays >= 0 && diffDays <= 10;
                if (filterType === 'valid') return diffDays > 10;
                return true;
            });

            renderProducts();
        }

        // عرض المنتجات
        function renderProducts() {
            const listDiv = document.getElementById('productsList');
            document.getElementById('productCount').textContent = `${filteredProducts.length} منتج`;

            if (filteredProducts.length === 0) {
                listDiv.innerHTML = `<div class="col-span-3 text-center py-12 bg-gray-50 rounded-lg"><p class="text-gray-500">لا توجد منتجات</p></div>`;
                return;
            }

            const today = new Date();
            listDiv.innerHTML = filteredProducts.map(p => {
                let expiryBadge = '';
                if (p.expiry_date) {
                    const diffDays = Math.ceil((new Date(p.expiry_date) - today) / (1000 * 60 * 60 * 24));
                    if (diffDays < 0) expiryBadge = `<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs">منتهي</span>`;
                    else if (diffDays <= 10) expiryBadge = `<span class="bg-orange-100 text-orange-700 px-2 py-1 rounded text-xs">باقي ${diffDays} يوم</span>`;
                    else expiryBadge = `<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">${p.expiry_date}</span>`;
                }

                const qty = parseInt(p.quantity || 0);
                const qtyBadge = qty === 0 
                    ? `<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs">نفدت الكمية</span>`
                    : `<span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs">الكمية: ${qty}</span>`;

                const profit = ((p.price - (p.cost_price || 0)) * qty).toFixed(2);
                const profitPercent = p.cost_price > 0 ? (((p.price - p.cost_price) / p.cost_price) * 100).toFixed(0) : 0;

                return `
                <div class="border rounded-xl overflow-hidden hover:shadow-lg transition bg-white">
                    <div class="h-32 bg-gradient-to-br from-indigo-100 to-purple-100 flex items-center justify-center">
                        <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                        </svg>
                    </div>
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg text-gray-800 line-clamp-1">${p.name}</h3>
                            ${expiryBadge}
                        </div>
                        <div class="flex gap-2 mb-3">${qtyBadge}</div>
                        <div class="space-y-1 mb-3">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">سعر البيع:</span>
                                <span class="font-bold text-indigo-600">${p.price} ريال</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">سعر الشراء:</span>
                                <span class="text-red-600">${p.cost_price || 0} ريال</span>
                            </div>
                            <div class="flex justify-between text-sm border-t pt-1">
                                <span class="text-gray-500">الربح الإجمالي:</span>
                                <span class="font-bold text-green-600">${profit} ريال (${profitPercent}%)</span>
                            </div>
                        </div>
                        ${p.barcode ? `<p class="text-xs text-gray-500 bg-gray-50 p-2 rounded">باركود: ${p.barcode}</p>` : ''}
                        <div class="flex gap-2 mt-3">
                            <button onclick="openEditModal(${p.id})" class="flex-1 bg-indigo-50 text-indigo-600 py-2 rounded-lg hover:bg-indigo-100 text-sm font-medium">تعديل</button>
                            <button onclick="deleteProduct(${p.id})" class="flex-1 bg-red-50 text-red-600 py-2 rounded-lg hover:bg-red-100 text-sm font-medium">حذف</button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // تصدير Excel
        function exportToExcel() {
            if (filteredProducts.length === 0) return showMessage('لا توجد بيانات للتصدير', 'error');
            
            const data = filteredProducts.map(p => ({
                'اسم المنتج': p.name,
                'الكمية': p.quantity || 0,
                'سعر البيع': p.price,
                'سعر الشراء': p.cost_price,
                'الربح الإجمالي': ((p.price - (p.cost_price || 0)) * (p.quantity || 0)).toFixed(2),
                'الباركود': p.barcode || '',
                'تاريخ الانتهاء': p.expiry_date || '',
                'الوصف': p.description || ''
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'المنتجات');
            XLSX.writeFile(wb, `منتجات_${new Date().toISOString().split('T')[0]}.xlsx`);
            showMessage('تم تصدير الملف بنجاح!', 'success');
        }

        // مودال التعديل
        function openEditModal(id) {
            const product = allProducts.find(p => p.id === id);
            document.getElementById('editProductId').value = product.id;
            document.getElementById('editProductName').value = product.name;
            document.getElementById('editProductPrice').value = product.price;
            document.getElementById('editProductCost').value = product.cost_price || 0;
            document.getElementById('editProductQty').value = product.quantity || 1;
            document.getElementById('editProductBarcode').value = product.barcode || '';
            document.getElementById('editProductExpiry').value = product.expiry_date || '';
            document.getElementById('editProductDesc').value = product.description || '';
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        document.getElementById('editProductForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editProductId').value;
            const { error } = await supabaseClient.from('products').update({
                name: document.getElementById('editProductName').value,
                price: document.getElementById('editProductPrice').value,
                cost_price: document.getElementById('editProductCost').value || 0,
                quantity: document.getElementById('editProductQty').value || 1,
                barcode: document.getElementById('editProductBarcode').value || null,
                description: document.getElementById('editProductDesc').value,
                expiry_date: document.getElementById('editProductExpiry').value || null
            }).eq('id', id).eq('user_id', currentUser.id);

            if (error) showMessage(error.message, 'error');
            else {
                showMessage('تم التحديث بنجاح!', 'success');
                closeEditModal();
                loadProducts();
            }
        };

        // حذف منتج
        async function deleteProduct(id) {
            if (!confirm('متأكد تبي تحذف المنتج؟')) return;
            const { error } = await supabaseClient.from('products').delete().eq('id', id).eq('user_id', currentUser.id);
            if (error) showMessage(error.message, 'error');
            else {
                showMessage('تم الحذف', 'success');
                loadProducts();
            }
        }

        // تسجيل خروج
        document.getElementById('logoutBtn').onclick = async () => {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        };

        function showMessage(msg, type) {
            messageDiv.classList.remove('hidden');
            messageDiv.textContent = msg;
            messageDiv.className = `mb-4 p-3 rounded-lg text-sm ${type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            setTimeout(() => messageDiv.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
