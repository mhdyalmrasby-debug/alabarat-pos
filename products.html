<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المنتجات - العَبَرات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
   .bg-navy { background-color: #0B2545; }
   .bg-gold { background-color: #F5B301; }
   .text-navy { color: #0B2545; }
   .modal { background-color: rgba(0,0,0,0.7); }
  </style>
</head>
<body class="bg-gray-100">
  <!-- Header -->
  <div class="bg-navy text-white p-4 shadow-lg">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-black">إدارة المنتجات</h1>
        <p id="storeInfo" class="text-sm text-gold">جاري تحميل المتجر...</p>
      </div>
      <div class="flex gap-3">
        <a href="dashboard.html" class="bg-white text-navy px-4 py-2 rounded-lg font-bold hover:bg-gray-200">لوحة التحكم</a>
        <a href="pos.html" class="bg-gold text-navy px-4 py-2 rounded-lg font-bold hover:opacity-90">الكاشير</a>
        <button onclick="openModal()" id="addBtn" disabled class="bg-gray-400 text-white px-4 py-2 rounded-lg font-bold cursor-not-allowed">+ منتج جديد</button>
        <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-red-600">خروج</button>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto p-6">
    <!-- Alerts -->
    <div id="errorBox" class="hidden bg-red-100 border-2 border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4 font-bold"></div>
    <div id="successBox" class="hidden bg-green-100 border-2 border-green-400 text-green-700 px-4 py-3 rounded-lg mb-4 font-bold"></div>

    <!-- Search -->
    <div class="mb-6">
      <input id="searchInput" onkeyup="filterProducts()" type="text" placeholder="🔍 ابحث بالاسم أو الباركود" class="w-full p-4 border-2 border-gray-300 rounded-lg text-lg focus:border-navy outline-none">
    </div>

    <!-- Products Grid -->
    <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
      <div class="col-span-full text-center text-gray-500 py-10">
        <div class="animate-spin w-8 h-8 border-4 border-navy border-t-transparent rounded-full mx-auto mb-3"></div>
        جاري تحميل المنتجات...
      </div>
    </div>
  </div>

  <!-- Modal إضافة منتج -->
  <div id="productModal" class="modal fixed inset-0 hidden items-center justify-center z-50">
    <div class="bg-white p-6 rounded-xl w-full max-w-md mx-4">
      <h3 class="text-2xl font-black text-navy mb-4">إضافة منتج جديد</h3>
      <input id="pName" type="text" placeholder="اسم المنتج *" class="w-full p-3 mb-3 border-2 rounded-lg focus:border-navy outline-none">
      <input id="pBarcode" type="text" placeholder="الباركود - اختياري" class="w-full p-3 mb-3 border-2 rounded-lg focus:border-navy outline-none">
      <input id="pCost" type="number" step="0.01" placeholder="سعر الشراء *" class="w-full p-3 mb-3 border-2 rounded-lg focus:border-navy outline-none">
      <input id="pSell" type="number" step="0.01" placeholder="سعر البيع *" class="w-full p-3 mb-3 border-2 rounded-lg focus:border-navy outline-none">
      <input id="pStock" type="number" placeholder="الكمية *" class="w-full p-3 mb-4 border-2 rounded-lg focus:border-navy outline-none">
      <div class="flex gap-3">
        <button onclick="saveProduct()" class="flex-1 bg-navy text-white p-3 rounded-lg font-bold hover:opacity-90">حفظ المنتج</button>
        <button onclick="closeModal()" class="flex-1 bg-gray-400 text-white p-3 rounded-lg font-bold hover:bg-gray-500">إلغاء</button>
      </div>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  // مهم: اضافة storage عشان يشتغل على Netlify و Edge
  const supabase = createClient(
    'https://eeiegignudoedrlkuaqn.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlaWVnaWdudWRvZWRybGt1YXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODUwNzMsImV4cCI6MjA5MzA2MTA3M30.gtqh1KbGmXZ9VBkmpFCYtJetn1ZXPHcp5oX9sENBb2Q',
    {
      auth: {
        persistSession: true,
        storage: window.localStorage,
        autoRefreshToken: true,
      }
    }
  )

  let currentStore = null;
  let allProducts = [];
  let filteredProducts = [];

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.classList.remove('hidden');
    setTimeout(() => box.classList.add('hidden'), 6000);
  }

  function showSuccess(msg) {
    const box = document.getElementById('successBox');
    box.textContent = msg;
    box.classList.remove('hidden');
    setTimeout(() => box.classList.add('hidden'), 3000);
  }

  async function init() {
    const { data: { session }, error: sessionError } = await supabase.auth.getSession();

    if (sessionError ||!session) {
      window.location.href = 'login.html';
      return;
    }

    const user = session.user;

    // جيب المتجر بدون.single() عشان ما يعطي 406
    const { data: stores, error: storeError } = await supabase
    .from('stores')
    .select()
    .eq('user_id', user.id)
    .limit(1);

    if (storeError) {
      showError('خطأ في جلب المتجر: ' + storeError.message);
      console.error('Store Error:', storeError);
      return;
    }

    if (!stores || stores.length === 0) {
      showError('لا يوجد متجر مرتبط بحسابك. تواصل مع الدعم');
      document.getElementById('storeInfo').textContent = 'لا يوجد متجر';
      return;
    }

    currentStore = stores[0];
    document.getElementById('storeInfo').textContent = `المتجر: ${currentStore.store_name}`;

    // فعّل زر الاضافة
    const addBtn = document.getElementById('addBtn');
    addBtn.disabled = false;
    addBtn.classList.remove('bg-gray-400', 'cursor-not-allowed');
    addBtn.classList.add('bg-gold', 'hover:opacity-90');

    await loadProducts();
  }

  async function loadProducts() {
    try {
      const { data: products, error } = await supabase
      .from('products')
      .select()
      .eq('store_id', currentStore.id)
      .order('created_at', { ascending: false });

      if (error) {
        showError('خطأ في تحميل المنتجات: ' + error.message);
        console.error('Load Error:', error);
        return;
      }

      allProducts = products || [];
      filteredProducts = [...allProducts];
      renderProducts();
    } catch (e) {
      showError('خطأ غير متوقع: ' + e.message);
      console.error('Catch Error:', e);
    }
  }

  function renderProducts() {
    const grid = document.getElementById('productsGrid');
    if (filteredProducts.length === 0) {
      grid.innerHTML = `
        <div class="col-span-full text-center py-16">
          <div class="text-6xl mb-4">📦</div>
          <div class="text-xl font-bold text-gray-600 mb-2">لا توجد منتجات</div>
          <div class="text-gray-500">اضغط "منتج جديد" لإضافة أول منتج</div>
        </div>`;
      return;
    }

    grid.innerHTML = '';
    filteredProducts.forEach(p => {
      const profit = Number(p.sell_price) - Number(p.cost_price);
      const profitPercent = ((profit / Number(p.cost_price)) * 100).toFixed(1);

      grid.innerHTML += `
        <div class="bg-white p-4 rounded-xl shadow-md hover:shadow-xl transition">
          <div class="font-black text-navy text-lg mb-2 truncate">${p.name}</div>
          <div class="text-xs text-gray-500 mb-3">باركود: ${p.barcode || 'بدون'}</div>

          <div class="space-y-2 mb-3">
            <div class="flex justify-between text-sm">
              <span class="text-gray-600">سعر الشراء:</span>
              <span class="font-bold">${Number(p.cost_price).toFixed(2)} ر.س</span>
            </div>
            <div class="flex justify-between text-sm">
              <span class="text-gray-600">سعر البيع:</span>
              <span class="font-bold text-green-600">${Number(p.sell_price).toFixed(2)} ر.س</span>
            </div>
            <div class="flex justify-between text-sm">
              <span class="text-gray-600">الربح:</span>
              <span class="font-bold text-gold">${profit.toFixed(2)} ر.س (${profitPercent}%)</span>
            </div>
          </div>

          <div class="text-center bg-gray-50 rounded-lg p-3 border-2 ${p.stock_qty <= 5? 'border-red-400' : 'border-gray-200'}">
            <div class="text-xs text-gray-500">الكمية المتوفرة</div>
            <div class="text-3xl font-black ${p.stock_qty <= 5? 'text-red-500' : 'text-navy'}">${p.stock_qty}</div>
          </div>
        </div>`;
    });
  }

  window.filterProducts = function() {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    if (!search) {
      filteredProducts = [...allProducts];
    } else {
      filteredProducts = allProducts.filter(p =>
        p.name.toLowerCase().includes(search) ||
        (p.barcode && p.barcode.toLowerCase().includes(search))
      );
    }
    renderProducts();
  }

  window.openModal = function() {
    if (!currentStore) {
      showError('انتظر تحميل المتجر أولاً');
      return;
    }
    document.getElementById('productModal').classList.remove('hidden');
    document.getElementById('productModal').classList.add('flex');
    document.getElementById('pName').focus();
  }

  window.closeModal = function() {
    document.getElementById('productModal').classList.add('hidden');
    ['pName', 'pBarcode', 'pCost', 'pSell', 'pStock'].forEach(id => document.getElementById(id).value = '');
  }

  window.saveProduct = async function() {
    if (!currentStore) {
      showError('خطأ: المتجر غير محمل. حدث الصفحة');
      return;
    }

    const name = document.getElementById('pName').value.trim();
    const barcode = document.getElementById('pBarcode').value.trim();
    const cost = parseFloat(document.getElementById('pCost').value);
    const sell = parseFloat(document.getElementById('pSell').value);
    const stock = parseInt(document.getElementById('pStock').value);

    if (!name ||!cost ||!sell ||!stock) {
      showError('عبي الحقول المطلوبة *');
      return;
    }

    if (sell <= cost) {
      showError('سعر البيع لازم أكبر من سعر الشراء');
      return;
    }

    if (stock < 0) {
      showError('الكمية لازم 0 أو أكثر');
      return;
    }

    const { error } = await supabase.from('products').insert({
      store_id: currentStore.id,
      name: name,
      barcode: barcode || null,
      cost_price: cost,
      sell_price: sell,
      stock_qty: stock
    });

    if (error) {
      showError('فشل الحفظ: ' + error.message);
      console.error('Insert Error:', error);
    } else {
      showSuccess('تم إضافة المنتج بنجاح ✅');
      closeModal();
      await loadProducts();
    }
  }

  window.logout = async function() {
    await supabase.auth.signOut();
    window.location.href = 'login.html';
  }

  // تشغيل
  init();
</script>
</body>
</html>
