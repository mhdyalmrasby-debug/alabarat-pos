<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نقطة البيع - الكاشير</title>
    <link rel="icon" href="data:,">
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --accent: #c8a876;
            --accent-light: #e8d5a3;
            --surface: #16213e;
            --card: #0f3460;
            --green: #2ecc71;
            --red: #e74c3c;
            --text: #eaeaea;
            --muted: #8a9bb0;
            --border: rgba(200,168,118,0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ─── Layout ─────────────────────────────── */
        .pos-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            height: 100vh;
        }

        /* ─── Left Panel ─────────────────────────── */
        .left-panel {
            display: flex;
            flex-direction: column;
            background: var(--primary);
            border-left: 1px solid var(--border);
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .store-title {
            font-size: 20px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        .store-title span {
            color: var(--text);
            font-weight: 300;
            font-size: 14px;
            display: block;
        }

        .dashboard-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 7px 18px;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .dashboard-btn:hover {
            background: var(--accent);
            color: var(--primary);
        }

        .search-bar {
            padding: 16px 24px;
            flex-shrink: 0;
        }

        .search-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px 12px 44px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            direction: rtl;
        }

        .search-input::placeholder { color: var(--muted); }
        .search-input:focus { border-color: var(--accent); }

        .search-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 18px;
        }

        /* ─── Products Grid ──────────────────────── */
        .products-area {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 24px;
        }

        .products-area::-webkit-scrollbar { width: 5px; }
        .products-area::-webkit-scrollbar-track { background: transparent; }
        .products-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
        }

        .product-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 14px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 60px; height: 60px;
            background: radial-gradient(circle, rgba(200,168,118,0.12), transparent);
            border-radius: 50%;
        }

        .product-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .product-card:active { transform: translateY(-1px); }

        .product-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .product-stock {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .product-stock.low { color: #e67e22; }

        .product-price {
            font-size: 17px;
            font-weight: 900;
            color: var(--accent);
        }

        .product-price span {
            font-size: 11px;
            font-weight: 400;
            color: var(--muted);
        }

        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            color: var(--muted);
            padding: 60px 20px;
            font-size: 15px;
        }

        /* ─── Right Panel (Invoice) ──────────────── */
        .right-panel {
            background: var(--surface);
            display: flex;
            flex-direction: column;
            border-right: none;
        }

        .invoice-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .invoice-title {
            font-size: 18px;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 14px;
        }

        .customer-fields {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-input {
            background: var(--primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 9px 13px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            direction: rtl;
        }

        .field-input::placeholder { color: var(--muted); }
        .field-input:focus { border-color: var(--accent); }

        /* ─── Cart Items ─────────────────────────── */
        .cart-area {
            flex: 1;
            overflow-y: auto;
            padding: 14px 20px;
        }

        .cart-area::-webkit-scrollbar { width: 4px; }
        .cart-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .cart-empty {
            text-align: center;
            color: var(--muted);
            padding: 40px 0;
            font-size: 14px;
        }

        .cart-item {
            background: var(--primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            transition: all 0.15s;
        }

        .cart-item-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .cart-item-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            flex: 1;
            line-height: 1.4;
        }

        .remove-btn {
            background: none;
            border: none;
            color: var(--red);
            font-size: 16px;
            cursor: pointer;
            padding: 0 0 0 6px;
            line-height: 1;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .remove-btn:hover { opacity: 1; }

        .cart-item-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border-radius: 8px;
            padding: 4px 8px;
        }

        .qty-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 18px;
            cursor: pointer;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            line-height: 1;
        }

        .qty-btn:hover { color: var(--accent-light); }

        .qty-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            min-width: 24px;
            text-align: center;
        }

        .item-subtotal {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
        }

        /* ─── Totals ─────────────────────────────── */
        .totals-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .totals-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .totals-row .label { color: var(--muted); }
        .totals-row .value { color: var(--text); font-weight: 600; }

        .totals-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 10px 0;
        }

        .total-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .total-label {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
        }

        .total-value {
            font-size: 22px;
            font-weight: 900;
            color: var(--accent);
        }

        /* ─── Buttons ────────────────────────────── */
        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-checkout {
            flex: 1;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-checkout:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(46,204,113,0.35);
        }

        .btn-checkout:disabled {
            background: #2c3e50;
            color: var(--muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-print {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--accent);
            font-family: 'Cairo', sans-serif;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
        }

        .btn-print:hover {
            background: var(--accent);
            color: var(--primary);
        }

        /* ─── Toast ──────────────────────────────── */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 9999;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--green); color: var(--green); }
        .toast.error { border-color: var(--red); color: var(--red); }

        /* ─── PRINT STYLES (Saudi Tax Invoice 80mm) ──── */
        @media print {
            body * { visibility: hidden !important; }
            #invoicePrint,
            #invoicePrint * { visibility: visible !important; }
            #invoicePrint {
                position: fixed !important;
                top: 0 !important;
                right: 0 !important;
                left: 0 !important;
                width: 72mm !important;
                margin: 0 auto !important;
                display: block !important;
            }
            @page {
                size: 80mm auto;
                margin: 4mm;
            }
        }

        /* ─── Invoice Print Template ─────────────── */
        #invoicePrint {
            display: none;
            direction: rtl;
            font-family: 'Cairo', sans-serif;
            font-size: 10pt;
            color: #000;
            background: #fff;
            width: 72mm;
            padding: 6mm 4mm;
        }

        .inv-center { text-align: center; }
        .inv-bold { font-weight: 700; }
        .inv-large { font-size: 13pt; }
        .inv-small { font-size: 8pt; color: #444; }
        .inv-divider {
            border: none;
            border-top: 1px dashed #000;
            margin: 5px 0;
        }
        .inv-solid-divider {
            border: none;
            border-top: 2px solid #000;
            margin: 5px 0;
        }
        .inv-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 2px 0;
            font-size: 9.5pt;
        }
        .inv-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 9pt;
            margin: 4px 0;
        }
        .inv-table th {
            border-bottom: 1px solid #000;
            border-top: 1px solid #000;
            padding: 3px 2px;
            text-align: right;
            font-weight: 700;
            font-size: 8.5pt;
        }
        .inv-table td {
            padding: 3px 2px;
            vertical-align: top;
        }
        .inv-table tr:last-child td { border-top: 1px dashed #ccc; }
        .inv-total-box {
            background: #f5f5f5;
            border: 1px solid #000;
            padding: 5px;
            margin: 4px 0;
        }
        .inv-grand-total {
            font-size: 13pt;
            font-weight: 900;
        }
        .inv-qr { text-align: center; margin: 6px 0 4px; }
        .inv-zatca-note {
            font-size: 8pt;
            color: #555;
            text-align: center;
            margin: 3px 0;
        }
    </style>
</head>
<body>

<div class="pos-layout">

    <!-- ─── LEFT: Products ─────────────────────── -->
    <div class="left-panel">
        <div class="top-bar">
            <div class="store-title">
                🛒 نقطة البيع
                <span id="storeName">جاري التحميل...</span>
            </div>
            <a href="dashboard.html" class="dashboard-btn">لوحة التحكم ←</a>
        </div>

        <div class="search-bar">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input"
                    placeholder="ابحث عن منتج بالاسم...">
            </div>
        </div>

        <div class="products-area">
            <div class="products-grid" id="productsGrid">
                <div class="empty-state">⏳ جاري تحميل المنتجات...</div>
            </div>
        </div>
    </div>

    <!-- ─── RIGHT: Invoice ─────────────────────── -->
    <div class="right-panel">
        <div class="invoice-header">
            <div class="invoice-title">🧾 الفاتورة الحالية</div>
            <div class="customer-fields">
                <input type="text" id="customerName" class="field-input"
                    placeholder="اسم العميل (اختياري)">
                <input type="text" id="customerPhone" class="field-input"
                    placeholder="رقم الجوال (اختياري)">
            </div>
        </div>

        <div class="cart-area" id="cartArea">
            <div class="cart-empty">السلة فارغة<br><span style="font-size:28px">🛒</span></div>
        </div>

        <div class="totals-area">
            <div class="totals-row">
                <span class="label">المجموع قبل الضريبة</span>
                <span class="value" id="subtotalDisplay">0.00 ر.س</span>
            </div>
            <div class="totals-row">
                <span class="label">ضريبة القيمة المضافة 15%</span>
                <span class="value" id="vatDisplay">0.00 ر.س</span>
            </div>
            <hr class="totals-divider">
            <div class="total-main">
                <span class="total-label">الإجمالي شامل الضريبة</span>
                <span class="total-value" id="grandTotal">0.00 ر.س</span>
            </div>
            <div class="action-btns">
                <button class="btn-checkout" id="checkoutBtn" onclick="createOrder()" disabled>
                    إنشاء الطلب وإصدار الفاتورة
                </button>
                <button class="btn-print" id="printBtn" onclick="printInvoice()" title="طباعة الفاتورة">
                    🖨️
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ─── TOAST ──────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ─── PRINT INVOICE (hidden) ───────────────── -->
<div id="invoicePrint"></div>

<script>
// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
const SUPABASE_URL  = 'https://jgekcfwacinmxkylrdpm.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnZWtjZndhY2lubXhreWxyZHBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTQxNTYsImV4cCI6MjA5NDI3MDE1Nn0._RA5UoWuUyPM0G4aGd9m2LOcsaEiMan2-Lvx60Cnf4Y';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── معلومات المتجر — عدّلها حسب بياناتك الحقيقية ──
const STORE = {
    nameAr:     'اسم متجرك',
    nameEn:     'Your Store Name',
    vatNumber:  '300000000000003',   // ← 15 رقم
    crNumber:   '1010000000',        // رقم السجل التجاري
    address:    'الرياض، المملكة العربية السعودية',
    phone:      '920000000',
    vatRate:    0.15                 // 15%
};

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentUser = null;
let allProducts = [];
let cart        = [];
let lastOrder   = null;
let invoiceSeq  = null; // رقم تسلسلي للفاتورة

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('storeName').textContent = STORE.nameAr;

    const { data: { user } } = await sb.auth.getUser();
    if (!user) { window.location.href = 'index.html'; return; }
    currentUser = user;

    document.getElementById('searchInput').addEventListener('input', e => {
        const q = e.target.value.toLowerCase();
        renderProducts(q ? allProducts.filter(p => p.name.toLowerCase().includes(q)) : allProducts);
    });

    await loadProducts();
});

// ══════════════════════════════════════════════
//  PRODUCTS
// ══════════════════════════════════════════════
async function loadProducts() {
    const { data, error } = await sb
        .from('products')
        .select('*')
        .eq('user_id', currentUser.id)
        .gt('quantity', 0)
        .order('name');

    if (error) {
        document.getElementById('productsGrid').innerHTML =
            `<div class="empty-state" style="color:#e74c3c">❌ خطأ: ${error.message}</div>`;
        return;
    }
    allProducts = data || [];
    renderProducts(allProducts);
}

function renderProducts(list) {
    const grid = document.getElementById('productsGrid');
    if (!list.length) {
        grid.innerHTML = '<div class="empty-state">لا توجد منتجات متاحة 📦</div>';
        return;
    }
    grid.innerHTML = list.map(p => `
        <div class="product-card" onclick="addToCart(${p.id})">
            <div class="product-name">${escHtml(p.name)}</div>
            <div class="product-stock ${p.quantity <= 5 ? 'low' : ''}">
                المخزون: ${p.quantity} وحدة
            </div>
            <div class="product-price">
                ${fmtMoney(p.price)} <span>ر.س</span>
            </div>
        </div>
    `).join('');
}

// ══════════════════════════════════════════════
//  CART
// ══════════════════════════════════════════════
function addToCart(id) {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    const item = cart.find(x => x.id === id);
    if (item) {
        if (item.qty >= p.quantity) { toast('الكمية المتاحة غير كافية', 'error'); return; }
        item.qty++;
    } else {
        cart.push({ id: p.id, name: p.name, price: p.price, qty: 1, maxQty: p.quantity });
    }
    renderCart();
}

function removeFromCart(id) {
    cart = cart.filter(x => x.id !== id);
    renderCart();
}

function changeQty(id, delta) {
    const item = cart.find(x => x.id === id);
    if (!item) return;
    const newQty = item.qty + delta;
    if (newQty <= 0) { removeFromCart(id); return; }
    if (newQty > item.maxQty) { toast('الكمية المتاحة غير كافية', 'error'); return; }
    item.qty = newQty;
    renderCart();
}

function renderCart() {
    const area        = document.getElementById('cartArea');
    const checkoutBtn = document.getElementById('checkoutBtn');
    const printBtn    = document.getElementById('printBtn');

    if (!cart.length) {
        area.innerHTML = '<div class="cart-empty">السلة فارغة<br><span style="font-size:28px">🛒</span></div>';
        setTotals(0);
        checkoutBtn.disabled = true;
        printBtn.style.display = lastOrder ? 'block' : 'none';
        return;
    }

    checkoutBtn.disabled = false;

    area.innerHTML = cart.map(item => `
        <div class="cart-item">
            <div class="cart-item-top">
                <div class="cart-item-name">${escHtml(item.name)}</div>
                <button class="remove-btn" onclick="removeFromCart(${item.id})">✕</button>
            </div>
            <div class="cart-item-bottom">
                <div class="qty-control">
                    <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
                    <span class="qty-value">${item.qty}</span>
                    <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
                </div>
                <div class="item-subtotal">${fmtMoney(item.price * item.qty)} ر.س</div>
            </div>
        </div>
    `).join('');

    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    setTotals(total);
}

function setTotals(grandTotal) {
    // افتراض أن الأسعار شاملة الضريبة
    const vat      = grandTotal * STORE.vatRate / (1 + STORE.vatRate);
    const subtotal = grandTotal - vat;

    document.getElementById('subtotalDisplay').textContent = fmtMoney(subtotal) + ' ر.س';
    document.getElementById('vatDisplay').textContent      = fmtMoney(vat)      + ' ر.س';
    document.getElementById('grandTotal').textContent      = fmtMoney(grandTotal) + ' ر.س';
}

// ══════════════════════════════════════════════
//  ORDER
// ══════════════════════════════════════════════
async function createOrder() {
    if (!cart.length) return;

    const btn = document.getElementById('checkoutBtn');
    btn.disabled = true;
    btn.textContent = 'جاري الحفظ...';

    const grandTotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
    const vat        = grandTotal * STORE.vatRate / (1 + STORE.vatRate);
    const subtotal   = grandTotal - vat;

    const orderData = {
        store_id:       currentUser.id,
        customer_name:  document.getElementById('customerName').value.trim() || 'عميل نقدي',
        customer_phone: document.getElementById('customerPhone').value.trim() || null,
        items:          cart.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.qty })),
        total_amount:   grandTotal,
        vat_amount:     vat,
        subtotal:       subtotal,
        status:         'تم التسليم'
    };

    const { data: order, error } = await sb
        .from('orders')
        .insert([orderData])
        .select()
        .single();

    if (error) {
        toast('فشل إنشاء الطلب: ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'إنشاء الطلب وإصدار الفاتورة';
        return;
    }

    const stockOk = await decreaseStock(cart);
    if (!stockOk) {
        await sb.from('orders').delete().eq('id', order.id);
        btn.disabled = false;
        btn.textContent = 'إنشاء الطلب وإصدار الفاتورة';
        return;
    }

    lastOrder = order;
    buildInvoicePrint(order, subtotal, vat, grandTotal);

    document.getElementById('printBtn').style.display = 'block';
    btn.textContent = 'إنشاء الطلب وإصدار الفاتورة';

    toast('✅ تم إصدار الفاتورة بنجاح', 'success');

    cart = [];
    renderCart();
    document.getElementById('customerName').value  = '';
    document.getElementById('customerPhone').value = '';
    await loadProducts();
}

async function decreaseStock(items) {
    for (const item of items) {
        const { data: p, error: fe } = await sb
            .from('products').select('quantity')
            .eq('id', item.id).eq('user_id', currentUser.id).single();

        if (fe || !p) { toast(`المنتج "${item.name}" غير موجود`, 'error'); return false; }

        const newQty = p.quantity - item.qty;
        if (newQty < 0) { toast(`الكمية غير كافية: ${item.name}`, 'error'); return false; }

        const { error: ue } = await sb
            .from('products').update({ quantity: newQty })
            .eq('id', item.id).eq('user_id', currentUser.id);

        if (ue) { toast('فشل تحديث المخزون', 'error'); return false; }
    }
    return true;
}

    }).join('');

    const html = `
    <div style="direction:rtl; font-family:'Cairo',sans-serif; color:#000; background:#fff;">

            فاتورة ضريبية مبسطة
        </div>
        <div style="text-align:center; font-size:8pt; color:#444; margin-bottom:5px;">
            Simplified Tax Invoice
        </div>

        <hr style="border:none; border-top:1px dashed #000; margin:4px 0;">

        <!-- ══ بيانات المتجر ════════════════════ -->
        <div style="font-size:8.5pt; margin:3px 0;">
            <div style="display:flex; justify-content:space-between;">
                <span style="font-weight:700;">الرقم الضريبي:</span>
                <span>${STORE.vatNumber}</span>
            </div>
            <div style="display:flex; justify-content:space-between;">
                <span style="font-weight:700;">السجل التجاري:</span>
                <span>${STORE.crNumber}</span>
            </div>
            <div style="display:flex; justify-content:space-between;">
                <span style="font-weight:700;">العنوان:</span>
                <span>${escHtml(STORE.address)}</span>
            </div>
            <div style="display:flex; justify-content:space-between;">
                <span style="font-weight:700;">الهاتف:</span>
                <span dir="ltr">${STORE.phone}</span>
            </div>
        </div>

        <hr style="border:none; border-top:1px dashed #000; margin:5px 0;">

        <!-- ══ بيانات الفاتورة ══════════════════ -->
        <div style="font-size:8.5pt; margin:3px 0;">
            <div style="display:flex; justify-content:space-between;">
                <span style="font-weight:700;">رقم الفاتورة:</span>
                <span dir="ltr" style="font-weight:700; color:#000;">${invNum}</span>
            </div>
            <div style="display:flex; justify-content:space-between;">

                <span>#${order.id}</span>

            <div style="display:flex; justify-content:space-between;">

            <div style="display:flex; justify-content:space-between;">

                <tr style="border-top:1px solid #000; border-bottom:1px solid #000;">
                    <th style="text-align:right; padding:3px 2px; font-weight:700;">الصنف</th>

        <hr style="border:none; border-top:1px dashed #000; margin:5px 0;">

        <!-- ══ الإجمالي ═════════════════════════ -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin:4px 0;">

            <span style="font-size:13pt; font-weight:900;">${fmtMoney(grandTotal)} ر.س</span>
        </div>

        <hr style="border:none; border-top:2px solid #000; margin:5px 0;">

        <!-- ══ QR Code (زاتكا) ══════════════════ -->

            <div id="invoiceQR"></div>
            <div style="font-size:7.5pt; color:#555; margin-top:3px;">

    const container = document.getElementById('invoicePrint');
    container.innerHTML = html;
    container.style.display = 'none';

    // QR Code
    setTimeout(() => {
        const qrEl = document.getElementById('invoiceQR');

            qrEl.innerHTML = '';
            try {
                new QRCode(qrEl, {
                    text: qrText,
                    width: 90,
                    height: 90,
                    correctLevel: QRCode.CorrectLevel.M
                });
            } catch(e) {

            }
        }
    }, 200);
}

// ── TLV Encoder (زاتكا FATOORAH) ─────────────
// كل حقل: [tag(1B), length(1B), value(nB)]
function buildZatcaTLV(sellerName, vatNum, dateTime, total, vatAmt) {
    function tlvField(tag, value) {
        const enc = new TextEncoder().encode(value);
        return [tag, enc.length, ...enc];
    }
    const bytes = [
        ...tlvField(1, sellerName),
        ...tlvField(2, vatNum),
        ...tlvField(3, dateTime),
        ...tlvField(4, total.toFixed(2)),
        ...tlvField(5, vatAmt.toFixed(2))
    ];
    return btoa(String.fromCharCode(...bytes));
}

// ══════════════════════════════════════════════
//  PRINT
// ══════════════════════════════════════════════
function printInvoice() {
    if (!lastOrder) { toast('لا توجد فاتورة للطباعة', 'error'); return; }
    const el = document.getElementById('invoicePrint');
    el.style.display = 'block';
    setTimeout(() => {
        window.print();
        el.style.display = 'none';
    }, 400);
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function fmtMoney(n) {
    return Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function escHtml(str) {
    return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
