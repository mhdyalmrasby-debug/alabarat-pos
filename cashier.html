<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نقطة البيع - الكاشير</title>
    <link rel="icon" href="data:,">
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        .product-card:hover { transform: translateY(-2px); transition: 0.2s; }
    </style>
</head>
<body class="bg-gray-100">

    <div class="flex h-screen">
        
        <!-- المنتجات -->
        <div class="w-2/3 p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-bold text-gray-800">🛒 نقطة البيع</h1>
                <a href="dashboard.html" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700">
                    لوحة التحكم
                </a>
            </div>

            <input type="text" id="searchInput" placeholder="ابحث عن منتج..." 
                class="w-full p-3 mb-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">

            <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <p class="col-span-full text-center text-gray-500">جاري تحميل المنتجات...</p>
            </div>
        </div>

        <!-- السلة -->
        <div class="w-1/3 bg-white shadow-lg p-6 flex-col">
            <h2 class="text-2xl font-bold mb-4">الفاتورة</h2>

            <div id="cartItems" class="flex-1 overflow-y-auto space-y-3">
                <p class="text-center text-gray-500 mt-10">السلة فارغة</p>
            </div>

            <div class="border-t pt-4 mt-4">
                <div class="flex justify-between mb-2">
                    <span class="text-gray-600">المجموع:</span>
                    <span id="cartTotal" class="text-xl font-bold">0.00 ريال</span>
                </div>

                <input type="text" id="customerName" placeholder="اسم العميل - اختياري" 
                    class="w-full p-2 mb-2 border rounded-lg">
                <input type="text" id="customerPhone" placeholder="رقم الجوال - اختياري" 
                    class="w-full p-2 mb-4 border rounded-lg">

                <button onclick="createOrder()" 
                    class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 disabled:bg-gray-400"
                    id="checkoutBtn" disabled>
                    إنشاء الطلب
                </button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jgekcfwacinmxkylrdpm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnZWtjZndhY2lubXhreWxyZHBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTQxNTYsImV4cCI6MjA5NDI3MDE1Nn0._RA5UoWuUyPM0G4aGd9m2LOcsaEiMan2-Lvx60Cnf4Y';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let allProducts = [];
        let cart = [];

        document.addEventListener('DOMContentLoaded', async () => {
           const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            await loadProducts();
        });

        async function loadProducts() {
            // يجيب منتجات صاحب المتجر فقط من جدول products
            const { data, error } = await supabaseClient
                .from('products')
                .select('*')
                .eq('user_id', currentUser.id)
                .gt('quantity', 0)
                .order('created_at', { ascending: false });

            if (error) {
                document.getElementById('productsGrid').innerHTML = 
                    '<p class="col-span-full text-center text-red-500">خطأ: ' + error.message + '</p>';
                return;
            }

            allProducts = data;
            renderProducts(allProducts);
        }

        function renderProducts(products) {
            const grid = document.getElementById('productsGrid');
            if (products.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center text-gray-500">لا توجد منتجات متاحة</p>';
                return;
            }

            grid.innerHTML = products.map(p => `
                <div class="product-card bg-white rounded-lg shadow p-4 cursor-pointer hover:shadow-lg"
                     onclick="addToCart(${p.id})">
                    <h3 class="font-bold text-gray-800">${p.name}</h3>
                    <p class="text-sm text-gray-500">المخزون: ${p.quantity}</p>
                    <p class="text-lg font-bold text-green-600 mt-2">${p.price} ريال</p>
                </div>
            `).join('');
        }

        document.getElementById('searchInput').oninput = (e) => {
            const search = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(search));
            renderProducts(filtered);
        };

        function addToCart(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;

            const existing = cart.find(item => item.id === productId);
            if (existing) {
                if (existing.quantity >= product.quantity) {
                    showToast('الكمية غير كافية', true);
                    return;
                }
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            renderCart();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            renderCart();
        }

        function updateQuantity(productId, newQty) {
            const product = allProducts.find(p => p.id === productId);
            if (newQty <= 0) {
                removeFromCart(productId);
                return;
            }
            if (newQty > product.quantity) {
                showToast('الكمية غير كافية', true);
                return;
            }
            const item = cart.find(i => i.id === productId);
            if (item) item.quantity = newQty;
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            const totalEl = document.getElementById('cartTotal');
            const checkoutBtn = document.getElementById('checkoutBtn');

            if (cart.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 mt-10">السلة فارغة</p>';
                totalEl.textContent = '0.00 ريال';
                checkoutBtn.disabled = true;
                return;
            }

            checkoutBtn.disabled = false;
            let total = 0;

            container.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `
                    <div class="border-b pb-2">
                        <div class="flex justify-between items-center">
                            <span class="font-semibold">${item.name}</span>
                            <button onclick="removeFromCart(${item.id})" class="text-red-500 text-sm">حذف</button>
                        </div>
                        <div class="flex justify-between items-center mt-1">
                            <input type="number" value="${item.quantity}" min="1" 
                                onchange="updateQuantity(${item.id}, parseInt(this.value))"
                                class="w-16 p-1 border rounded text-center">
                            <span>${(item.price * item.quantity).toFixed(2)} ريال</span>
                        </div>
                    </div>
                `;
            }).join('');

            totalEl.textContent = total.toFixed(2) + ' ريال';
        }

        async function createOrder() {
            if (cart.length === 0) return;

            const orderData = {
                store_id: currentUser.id,
                customer_name: document.getElementById('customerName').value || 'عميل نقدي',
                customer_phone: document.getElementById('customerPhone').value || null,
                items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.quantity })),
                total_amount: cart.reduce((sum, i) => sum + i.price * i.quantity, 0),
                status: 'تم التسليم'
            };

            // أنشئ الطلب
            const { data: order, error: orderError } = await supabaseClient
                .from('orders')
                .insert([orderData])
                .select()
                .single();

            if (orderError) {
                showToast('فشل إنشاء الطلب: ' + orderError.message, true);
                return;
            }

            // نقص المخزون من جدول products
            const stockOk = await decreaseStock(cart);
            if (!stockOk) {
                await supabaseClient.from('orders').delete().eq('id', order.id);
                return;
            }

            showToast('تم إنشاء الطلب بنجاح ✅');
            cart = [];
            renderCart();
            document.getElementById('customerName').value = '';
            document.getElementById('customerPhone').value = '';
            await loadProducts();
        }

        async function decreaseStock(items) {
            try {
                for (const item of items) {
                    const { data: product, error: fetchError } = await supabaseClient
                        .from('products')
                        .select('quantity')
                        .eq('id', item.id)
                        .eq('user_id', currentUser.id)
                        .single();

                    if (fetchError || !product) {
                        showToast(`المنتج ${item.name} غير موجود`, true);
                        return false;
                    }

                    const newQty = product.quantity - item.quantity;
                    if (newQty < 0) {
                        showToast(`الكمية غير كافية للمنتج ${item.name}`, true);
                        return false;
                    }

                    const { error: updateError } = await supabaseClient
                        .from('products')
                        .update({ quantity: newQty })
                        .eq('id', item.id)
                        .eq('user_id', currentUser.id);

                    if (updateError) {
                        showToast('فشل تحديث المخزون', true);
                        return false;
                    }
                }
                return true;
            } catch (err) {
                showToast('خطأ في المخزون', true);
                return false;
            }
        }

        function showToast(message, isError = false) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.className = 'fixed top-4 right-4 text-white px-6 py-3 rounded-lg shadow-lg z-50 transition-opacity opacity-0';
                document.body.appendChild(toast);
            }
            toast.className = `fixed top-4 right-4 ${isError ? 'bg-red-600' : 'bg-green-600'} text-white px-6 py-3 rounded-lg shadow-lg z-50 transition-opacity opacity-0`;
            toast.textContent = message;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            setTimeout(() => toast.classList.add('opacity-0'), 3000);
        }
    </script>
</body>
</html>
